<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ED1C24">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="CK Inventory">
<meta name="author" content="Matthew Dunham, send_me_letters@hotmail.com">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./favicon.ico" sizes="48x48" type="image/x-icon">
<link rel="icon" href="./icon.svg" type="image/svg+xml" sizes="any">
<link rel="apple-touch-icon" href="./apple-touch-icon.png" sizes="180x180">
<title>CK Inventory</title>
<style>
:root{
  --ck-red:#ED1C24;
  --ck-red-dark:#C4121C;
  --ck-red-soft:#FFF0F1;
  --ck-page:#f6f6f7;
  --ck-line:#e8e8ea;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--ck-page);color:#111;font-size:14px}
.app{display:flex;flex-direction:column;height:100%;max-width:640px;margin:0 auto;position:relative}
/* Header */
.hdr{background:#fff;border-bottom:1px solid var(--ck-line);padding:7px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:50;box-shadow:0 1px 0 rgba(237,28,36,.04)}
.logo{display:flex;align-items:center;gap:6px;font-weight:600;font-size:13px}
button.logo{background:none;border:none;padding:0;margin:0;font:inherit;color:inherit;cursor:pointer;text-align:left;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
button.logo:active{opacity:.88}
button.logo:focus-visible{outline:2px solid var(--ck-red);outline-offset:2px;border-radius:6px}
.logo-dot{width:22px;height:22px;background:var(--ck-red);border-radius:5px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:700}
.hdr-right{display:flex;align-items:center;gap:6px}
.chip{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;white-space:nowrap}
.chip-ok{background:#dcfce7;color:#166534}
.chip-warn{background:#fef3c7;color:#92400e}
.chip-danger{background:#fee2e2;color:#991b1b}
.chip-gray{background:#f3f4f6;color:#6b7280}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#d1d5db;flex-shrink:0}
.sync-dot.ok{background:#22c55e}
.sync-dot.err{background:#ef4444}
.sync-dot.spin{background:#f59e0b;animation:pulse 1s infinite}
/* In-flight progress strip (below header) */
.progress-toast{flex-shrink:0;max-width:640px;margin:0 auto;width:100%;border-bottom:1px solid #fecdd3;background:linear-gradient(180deg,#fff5f5 0%,#fff 100%)}
.progress-toast-inner{display:flex;align-items:center;justify-content:center;gap:10px;padding:8px 12px;font-size:13px;font-weight:600;color:var(--ck-red-dark)}
.progress-toast-spin{width:16px;height:16px;border:2px solid #fecaca;border-top-color:var(--ck-red);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.main.ck-busy button{pointer-events:none;opacity:.62;cursor:wait}
.main.ck-busy button:disabled{opacity:.35}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
/* Main scroll */
.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px;padding-bottom:64px;-webkit-overflow-scrolling:touch}
/* Tab bar */
.tabs{position:sticky;bottom:0;background:#fff;border-top:1px solid var(--ck-line);display:flex;z-index:50;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 2px;background:none;border:none;cursor:pointer;color:#9ca3af;font-size:9px;font-family:inherit;font-weight:400;transition:color .15s}
.tab.on{color:var(--ck-red);font-weight:600}
.tab svg{width:18px;height:18px}
/* Cards & blocks */
.card{background:#fff;border:1px solid var(--ck-line);border-radius:10px;overflow:hidden;margin-bottom:7px}
.card-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-bottom:1px solid #f3f4f6;background:none;border:none;border-bottom:1px solid #f3f4f6;cursor:pointer;width:100%;font-family:inherit}
.card-hdr-static{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-bottom:1px solid #f3f4f6}
.cat-l1{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:#9ca3af;font-weight:600}
.cat-l2{font-size:12px;font-weight:600;color:#111}
.cat-labels{display:flex;align-items:center;gap:5px}
.badge{display:inline-flex;align-items:center;justify-content:center;font-size:11px;padding:2px 8px;border-radius:20px;background:#f3f4f6;color:#6b7280;font-weight:500}
.badge.done{background:#dcfce7;color:#166534}
.badge.warn{background:#fef3c7;color:#92400e}
.badge.info{background:#dbeafe;color:#1e40af}
.item-row{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-bottom:1px solid #f4f4f5}
.item-row:last-child{border-bottom:none}
.count-item-row{transition:background .18s ease,box-shadow .18s ease,border-radius .18s ease}
.count-item-row:focus-within{background:linear-gradient(90deg,var(--ck-red-soft) 0%,#fff 55%);box-shadow:inset 4px 0 0 var(--ck-red);border-radius:8px}
.count-item-row:focus-within .item-name{font-weight:800;color:var(--ck-red-dark)}
.count-cog-btn{width:36px;height:36px;padding:0;border-radius:9px;border:1px solid var(--ck-line);background:#fff;color:#6b7280;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;touch-action:manipulation;flex-shrink:0;font:inherit}
.count-cog-btn:active{opacity:.88}
.count-cog-btn.on{color:var(--ck-red-dark);border-color:var(--ck-red);background:var(--ck-red-soft)}
.count-cog-btn svg{width:18px;height:18px}
.l1-block{margin-bottom:8px}
.l1-hdr{display:flex;align-items:center;justify-content:space-between;width:100%;padding:8px 10px;background:#fff;border:1px solid var(--ck-line);border-radius:10px;cursor:pointer;font-family:inherit;text-align:left;margin-bottom:6px}
.l1-hdr:active{background:#fafafa}
.l1-title{font-size:14px;font-weight:700;color:#111;display:flex;align-items:center;gap:6px}
.l1-inner{padding-left:2px}
.seg-row{display:flex;gap:0;margin-bottom:8px;background:#fff;border:1px solid var(--ck-line);border-radius:8px;overflow:hidden}
.seg{flex:1;padding:7px 6px;border:none;background:#fff;font-family:inherit;font-size:11px;font-weight:500;color:#6b7280;cursor:pointer}
.seg.on{background:var(--ck-red-soft);color:var(--ck-red-dark);box-shadow:inset 0 -2px 0 var(--ck-red);font-weight:600}
.walk-bar{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.walk-selects{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.walk-selects select{width:100%;padding:7px 8px;border-radius:7px;border:1px solid var(--ck-line);font-size:12px;font-family:inherit;background:#fff;color:#111}
.walk-card{text-align:center;padding:14px 12px 12px;overflow:visible}
.walk-breadcrumb{font-size:10px;color:#9ca3af;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.walk-name{font-size:18px;font-weight:700;color:#111;margin-bottom:4px;line-height:1.25}
.walk-meta{font-size:12px;color:#6b7280;margin-bottom:12px}
.walk-qty-strip{display:flex;align-items:stretch;justify-content:center;gap:8px;margin:0 auto 14px;max-width:100%;padding:0 2px}
.walk-qty-center{flex:0 1 220px;min-width:0;display:flex;flex-direction:column;align-items:center}
.walk-qty{width:100%;max-width:220px;padding:12px 10px;font-size:24px;font-weight:700;border-radius:10px;border:2px solid var(--ck-line);background:#fafafa;margin:0;display:block;text-align:center;font-family:'SF Mono',monospace}
.walk-qty:focus{border-color:var(--ck-red);background:#fff;outline:none}
.walk-float-btn{flex:0 0 auto;width:78px;min-height:88px;padding:8px 6px;border:none;border-radius:14px;font-size:13px;font-weight:800;font-family:inherit;line-height:1.15;cursor:pointer;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;box-shadow:0 6px 20px rgba(17,17,17,.14);transition:transform .12s,filter .12s,opacity .12s}
.walk-float-btn:active:not(:disabled){transform:scale(.97)}
.walk-float-btn:disabled{opacity:.38;cursor:not-allowed;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.walk-float-prev{background:linear-gradient(180deg,#f9fafb 0%,#eef0f3 100%);color:#374151;border:1px solid var(--ck-line)}
.walk-float-next{background:linear-gradient(180deg,var(--ck-red) 0%,var(--ck-red-dark) 100%);color:#fff;border:1px solid var(--ck-red-dark)}
.walk-float-icon{font-size:28px;font-weight:700;line-height:1;font-family:system-ui,sans-serif;opacity:.95}
.walk-float-lbl{font-size:11px;font-weight:700;letter-spacing:.02em;text-transform:uppercase}
@media (max-width:380px){
  .walk-float-btn{width:68px;min-height:80px;padding:6px 4px}
  .walk-float-icon{font-size:24px}
  .walk-qty-center{flex-basis:min(200px,46vw)}
}
.manual-order-wrap{margin-top:10px;padding-top:10px;border-top:1px solid var(--ck-line);text-align:center}
.manual-order-lbl{font-size:10px;color:#9ca3af;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.manual-order-row{display:flex;align-items:center;justify-content:center;gap:10px}
.manual-order-val{min-width:36px;font-size:16px;font-weight:700;font-family:'SF Mono',monospace;color:var(--ck-red-dark)}
.manual-order-wrap .btn-manual{min-width:44px;padding:9px 12px;font-size:17px;font-weight:700;line-height:1;border-radius:8px;border:1px solid var(--ck-line);background:#f9fafb;cursor:pointer;font-family:inherit;color:#374151;touch-action:manipulation}
.manual-order-wrap .btn-manual:active{background:#eee}
.manual-order-hint{font-size:10px;color:#9ca3af;margin-top:8px;line-height:1.4;max-width:300px;margin-left:auto;margin-right:auto}
.manual-order-inline{display:flex;align-items:center;flex-wrap:wrap;gap:6px;padding:6px 10px 8px;border-bottom:1px solid #f4f4f5;font-size:11px;color:#6b7280}
.manual-order-inline:last-child{border-bottom:none}
.manual-order-inline .btn-manual-sm{min-width:32px;padding:4px 8px;font-size:14px;font-weight:700;line-height:1;border-radius:6px;border:1px solid var(--ck-line);background:#f9fafb;cursor:pointer;font-family:inherit;color:#374151;touch-action:manipulation}
.manual-order-inline .btn-manual-sm:active{background:#eee}
.manual-order-val-sm{font-weight:700;font-family:'SF Mono',monospace;color:var(--ck-red-dark);min-width:22px;text-align:center}
.manual-order-inline-lbl{color:#9ca3af;font-size:10px;text-transform:uppercase;letter-spacing:.05em;margin-right:2px}
.manual-order-inline-prev{margin-left:auto;color:#9ca3af;font-size:10px}
.walk-pos{font-size:11px;color:#9ca3af;margin-bottom:6px}
.reorder-btns{display:flex;flex-direction:column;gap:2px;margin-right:4px}
.reorder-btns button{min-width:26px;padding:1px 0;font-size:10px;line-height:1;border-radius:4px;border:1px solid var(--ck-line);background:#f9fafb;cursor:pointer;font-family:inherit;color:#374151}
.reorder-btns button:active{background:#eee}
.setup-l1-tools{display:flex;align-items:center;gap:4px;flex-shrink:0}
.item-name{font-size:12px;font-weight:600;margin-bottom:0;line-height:1.25}
.item-meta{font-size:11px;color:#9ca3af}
.setup-code-chip{display:inline-flex;align-items:center;padding:1px 6px;border-radius:999px;border:1px dashed #d1d5db;background:#f9fafb;color:#374151;cursor:pointer}
.setup-code-edit{display:inline-flex;align-items:center;gap:4px;max-width:100%}
.setup-code-input{width:110px;max-width:100%;padding:3px 7px;border-radius:7px;border:1px solid var(--ck-line);font-size:12px;font-family:'SF Mono',monospace;outline:none}
.setup-code-input:focus{border-color:var(--ck-red);background:#fff}
.setup-code-actions{display:inline-flex;align-items:center;gap:4px}
.setup-code-btn{display:inline-flex;align-items:center;justify-content:center;min-width:42px;padding:3px 6px;border-radius:7px;border:1px solid var(--ck-line);font-size:10px;font-weight:600;font-family:inherit;cursor:pointer}
.setup-code-btn.save{background:var(--ck-red);border-color:var(--ck-red);color:#fff}
.setup-code-btn.cancel{background:#fff;color:#6b7280}
.setup-ord-badge{display:inline-flex;align-items:center;padding:1px 6px;border-radius:999px;background:#eef2ff;color:#3730a3;font-size:10px;font-weight:600;margin-left:6px}
.mono{font-family:'SF Mono',monospace;font-size:10px}
.qinput{width:58px;padding:5px 5px;background:#f9fafb;border:1px solid var(--ck-line);border-radius:7px;color:#111;font-size:14px;font-family:'SF Mono',monospace;font-weight:600;text-align:center;outline:none;transition:border-color .15s}
.qinput:focus{border-color:var(--ck-red);background:#fff}
.ulbl{font-size:11px;color:#9ca3af;margin-left:3px}
/* Progress bar */
.prog{height:3px;background:#f3f4f6;border-radius:2px;margin-bottom:10px;overflow:hidden}
.prog-fill{height:100%;background:var(--ck-red);border-radius:2px;transition:width .3s}
.prog-fill.done{background:#22c55e}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:4px;border-radius:7px;padding:7px 12px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;border:none;transition:opacity .15s,filter .15s;touch-action:manipulation}
.btn:active{opacity:.85}
.btn-primary{background:var(--ck-red);color:#fff}
.btn-primary:hover{filter:brightness(0.94)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-secondary{background:#fff;color:#374151;border:1px solid var(--ck-line)}
.btn-secondary:hover{background:#f9fafb}
.btn-danger{background:#fee2e2;color:#991b1b}
.btn-ghost{background:none;color:#6b7280;border:1px solid var(--ck-line)}
.btn-sm{padding:5px 10px;font-size:11px}
/* Page header row */
.pg-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.pg-title{font-size:17px;font-weight:700;margin-bottom:1px}
.pg-sub{font-size:12px;color:#9ca3af}
/* Sections row */
.row{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:7px}
/* Banners */
.banner{border-radius:8px;padding:8px 10px;font-size:12px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.banner-ok{background:#dcfce7;color:#166534}
.banner-warn{background:#fef3c7;color:#92400e}
.banner-err{background:#fee2e2;color:#991b1b}
.banner-info{background:#dbeafe;color:#1e3a8a}
/* Metric cards */
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.metric{background:#f9fafb;border-radius:8px;padding:7px 6px;text-align:center}
.metric-v{font-size:19px;font-weight:700;font-family:'SF Mono',monospace;color:var(--ck-red);line-height:1}
.metric-l{font-size:10px;color:#9ca3af;margin-top:2px}
/* Order card */
.ord-card{background:#fff;border:1px solid var(--ck-line);border-radius:10px;padding:10px;margin-bottom:7px}
.ord-top{display:flex;justify-content:space-between;align-items:flex-start}
.ord-card.ord-acked{border-color:#86efac;background:linear-gradient(180deg,#f0fdf4 0%,#fff 100%)}
.order-list-bc-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid #f3f4f6}
.order-list-bc-bar{flex:1;min-width:0;text-align:left}
.order-list-bc-bar svg,.order-list-bc-bar img.order-qr-img{max-width:100%;height:auto;display:block}
.order-list-bc-qty{flex-shrink:0;text-align:center;padding:0 2px;min-width:64px;max-width:100px}
.order-list-bc-qty .order-rec-qty{font-size:26px;font-weight:800;font-family:'SF Mono',monospace;color:#111;line-height:1}
.order-list-bc-qty .order-rec-qty-lbl{font-size:9px;color:#4b5563;margin-top:3px;font-weight:600;line-height:1.2}
.order-walk-bcs-row .order-list-bc-qty{min-width:72px;max-width:110px;padding:0 4px}
.order-walk-bcs-row .order-list-bc-qty .order-rec-qty{font-size:30px}
.order-walk-bcs-row .order-list-bc-qty .order-rec-qty-lbl{font-size:10px}
.order-ack-btn{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;min-width:140px;border-radius:10px;padding:10px 16px;font-family:inherit;cursor:pointer;border:2px solid var(--ck-line);background:#fafafa;color:#374151;transition:background .15s,border-color .15s,color .15s,box-shadow .15s}
.order-ack-btn-list{flex-shrink:0;min-width:0;max-width:118px;padding:6px 10px;border-radius:8px;gap:1px;border-width:1.5px}
.order-ack-btn-list .order-ack-title{font-size:11px;font-weight:800;letter-spacing:.02em;line-height:1.1}
.order-ack-btn-list .order-ack-sub{font-size:8px;max-width:108px;line-height:1.15}
.order-ack-btn-list svg{width:14px;height:14px}
.order-ack-title{font-size:14px;font-weight:800;letter-spacing:.02em;line-height:1.15}
.order-ack-sub{font-size:10px;font-weight:500;color:#9ca3af;line-height:1.2;text-align:center;max-width:160px}
.order-ack-btn-pending{border-style:dashed;border-color:#d1d5db;background:#fff}
.order-ack-btn.on{border-color:#16a34a;background:#ecfdf5;color:#14532d;box-shadow:inset 0 0 0 1px rgba(22,163,74,.15)}
.order-ack-btn.on .order-ack-sub{color:#166534;font-weight:600}
.order-sum-card{background:#fff;border:1px solid var(--ck-line);border-radius:10px;padding:10px 11px;margin-bottom:8px}
.order-sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center}
.order-sum-v{font-size:18px;font-weight:700;font-family:'SF Mono',monospace;color:var(--ck-red);line-height:1.1}
.order-sum-l{font-size:10px;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;margin-top:3px}
.order-sum-note{font-size:10px;color:#9ca3af;margin-top:8px;line-height:1.35}
.order-hide-scanned-row{display:flex;align-items:center;gap:8px;margin:0 0 8px;padding:8px 10px;background:#fff;border:1px solid var(--ck-line);border-radius:8px;font-size:12px;color:#374151}
.order-hide-scanned-row input{width:16px;height:16px;accent-color:var(--ck-red);flex-shrink:0}
.order-hide-scanned-row label{cursor:pointer;user-select:none;line-height:1.3}
.bc-wrap{margin-top:7px;padding-top:7px;border-top:1px solid #f3f4f6}
.bc-wrap svg,.bc-wrap img.order-qr-img{max-width:100%;height:auto}
/* Countdown */
.countdown-bar{background:#fff;border:1px solid var(--ck-line);border-radius:9px;padding:9px 10px;margin-bottom:8px}
.countdown-inner{display:flex;align-items:center;justify-content:space-between}
.countdown-label{font-size:11px;color:#9ca3af;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.countdown-value{font-size:15px;font-weight:700;font-family:'SF Mono',monospace}
.countdown-divider{width:1px;height:36px;background:#f3f4f6}
/* Truck schedule */
.schedule-card{background:#fff;border:1px solid var(--ck-line);border-radius:9px;padding:9px 10px;margin-bottom:8px;display:flex;gap:12px}
.sched-item{flex:1;text-align:center}
.sched-label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:#9ca3af;margin-bottom:3px}
.sched-value{font-size:13px;font-weight:600}
.sched-time{font-size:11px;color:#6b7280}
/* History */
.session-row{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-bottom:1px solid #f4f4f5;cursor:pointer}
.session-row:last-child{border-bottom:none}
.session-row:active{background:#f9fafb}
/* Form */
.form-card{background:#fff;border:1px solid var(--ck-line);border-radius:10px;padding:11px;margin-bottom:7px}
.fg{margin-bottom:8px}
.flabel{display:block;font-size:10px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.finput{width:100%;padding:7px 10px;background:#f9fafb;border:1px solid var(--ck-line);border-radius:7px;color:#111;font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
.finput:focus{border-color:var(--ck-red);background:#fff}
.back-btn{display:inline-flex;align-items:center;gap:4px;background:none;border:none;color:#6b7280;font-size:12px;font-family:inherit;cursor:pointer;padding:0 0 7px 0}
/* Usage bar */
.usage-bar-wrap{margin-top:6px;height:5px;background:#f3f4f6;border-radius:3px;overflow:hidden}
.usage-bar-fill{height:100%;border-radius:3px;background:var(--ck-red)}
.usage-week-card{margin-bottom:8px}
.usage-week-hdr{font-size:12px;font-weight:700;color:#111;margin-bottom:2px}
.usage-week-sub{font-size:10px;color:#9ca3af;margin-bottom:8px}
.usage-week-line{font-size:11px;color:#374151;padding:5px 0;border-bottom:1px solid #f4f4f5;display:flex;justify-content:space-between;gap:8px;align-items:baseline}
.usage-week-line:last-child{border-bottom:none}
.usage-week-used{font-family:'SF Mono',monospace;font-weight:600;color:var(--ck-red);flex-shrink:0}
.usage-chip-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.usage-chip{font-size:10px;padding:2px 6px;border-radius:6px;background:#f3f4f6;color:#4b5563;font-family:'SF Mono',monospace}
.usage-stat-sub{font-size:10px;color:#9ca3af;margin-top:2px;line-height:1.35}
/* DB test */
.test-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f3f4f6;font-size:12px}
.test-row:last-child{border-bottom:none}
.test-status{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px}
.t-pass{background:#dcfce7;color:#166534}
.t-fail{background:#fee2e2;color:#991b1b}
.t-skip{background:#f3f4f6;color:#6b7280}
.t-run{background:#dbeafe;color:#1e40af}
/* Help */
.help-step-list{margin:8px 0 0 18px;display:flex;flex-direction:column;gap:5px;font-size:12px;color:#374151;line-height:1.45}
.help-step-list li strong{color:#111}
.help-inline-actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.help-note{font-size:11px;color:#6b7280;line-height:1.45;margin-top:8px}
/* Empty state */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:32px 14px;color:#9ca3af;text-align:center;font-size:12px}
/* Sticky footer */
.sticky-footer{background:transparent;border-top:none;padding:8px 0 0;margin-top:8px;display:flex;flex-direction:column;gap:6px}
.sticky-footer-row{display:flex;justify-content:flex-end;align-items:center;gap:8px;flex-wrap:wrap}
.sticky-footer-row.between{justify-content:space-between;align-items:center}
.sticky-footer-copy{font-size:10px;color:#9ca3af;text-align:center;line-height:1.45;padding-top:2px}
.sticky-footer-copy a{color:#9ca3af;text-decoration:underline}
/* PIN gate */
.pin-overlay{position:fixed;inset:0;background:rgba(255,255,255,.97);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:250;padding:16px;text-align:center}
.pin-box{background:#fff;border:1px solid var(--ck-line);border-radius:12px;padding:18px 16px;max-width:320px;width:100%;box-shadow:0 8px 30px rgba(0,0,0,.06)}
.pin-title{font-size:17px;font-weight:700;margin-bottom:5px}
.pin-sub{font-size:12px;color:#6b7280;margin-bottom:12px}
.pin-input{width:100%;padding:10px 12px;font-size:18px;letter-spacing:.22em;text-align:center;font-family:'SF Mono',monospace;border:2px solid var(--ck-line);border-radius:9px;outline:none}
.pin-input:focus{border-color:var(--ck-red)}
.pin-err{font-size:12px;color:#991b1b;margin-top:8px;min-height:1.2em}
.pin-actions{margin-top:12px}
/* Scrollable SQL block */
.sql-block{background:#1e1e2e;color:#cdd6f4;font-size:10px;font-family:'SF Mono',monospace;padding:9px;border-radius:7px;overflow-x:auto;white-space:pre;line-height:1.45;margin:6px 0}
/* Install banner (shown on all tabs until dismissed or installed) */
.install-banner{border-radius:8px;padding:9px 10px;margin-bottom:8px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;flex-wrap:wrap}
.install-banner--chrome{background:#fffbeb;border:1px solid #fcd34d}
.install-banner--ios{background:#eff6ff;border:1px solid #93c5fd}
.install-banner--android{background:#fffbeb;border:1px solid #fcd34d}
.install-banner .install-banner-actions{display:flex;gap:6px;flex-shrink:0;align-items:flex-start}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:200;font-size:13px;color:#6b7280}
.spinner{width:28px;height:28px;border:3px solid #f3f4f6;border-top:3px solid var(--ck-red);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Count form lock (popover-style) */
.count-form-shell{position:relative;min-height:min(420px,72vh)}
.count-form-lock{position:absolute;inset:0;z-index:25;display:flex;align-items:center;justify-content:center;padding:16px 12px;background:rgba(246,246,247,.82);backdrop-filter:blur(6px);border-radius:12px;border:1px solid var(--ck-line)}
.count-form-lock-card{background:#fff;border-radius:12px;padding:18px 16px;max-width:300px;width:100%;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.1);border:1px solid var(--ck-line)}
.count-form-lock-title{font-size:16px;font-weight:700;color:#111;margin-bottom:6px}
.count-form-lock-sub{font-size:12px;color:#6b7280;line-height:1.45;margin-bottom:14px}
.count-form-shell.is-locked .count-form-pane{filter:grayscale(.08) saturate(.85);opacity:.55;pointer-events:none;user-select:none}
</style>
</head>
<body>
<div class="app" id="app">
  <div id="pin-overlay" class="pin-overlay" aria-modal="true" role="dialog" aria-labelledby="pin-title">
    <div class="pin-box">
      <div class="pin-title" id="pin-title">Store access</div>
      <div class="pin-sub">Enter your Casey's store code to continue.</div>
      <input id="pin-input" class="pin-input" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="8" autocomplete="one-time-code" autofocus aria-label="Store code" onkeydown="if(event.key==='Enter')submitStorePin()" oninput="onStorePinInput()">
      <div id="pin-err" class="pin-err" role="alert"></div>
      <div class="pin-actions">
        <button type="button" class="btn btn-primary" style="width:100%" onclick="submitStorePin()">Continue</button>
        <button type="button" class="btn btn-secondary" style="width:100%;margin-top:8px" onclick="toggleStoreSignup(true)">Sign up new store</button>
      </div>
      <div id="signup-wrap" style="display:none;margin-top:12px;padding-top:12px;border-top:1px solid #f3f4f6">
        <div class="pin-sub" style="margin-bottom:10px">Create a new store using your Casey's store code.</div>
        <input id="signup-store-name" class="finput" type="text" placeholder="Store name (e.g. Casey's #2511)" aria-label="Store name" style="margin-bottom:8px">
        <input id="signup-store-code" class="pin-input" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="8" placeholder="Store code" aria-label="Store code" oninput="onSignupStoreCodeInput()">
        <div id="signup-err" class="pin-err" role="alert"></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button type="button" class="btn btn-primary" style="flex:1;min-width:120px" onclick="signupStore()">Create Store</button>
          <button type="button" class="btn btn-secondary" style="flex:1;min-width:120px" onclick="toggleStoreSignup(false)">Cancel</button>
        </div>
      </div>
    </div>
  </div>
  <div id="loading-overlay" class="loading-overlay">
    <div class="spinner"></div>
    <span id="loading-msg">Connecting to database…</span>

  <div class="hdr">

    <div class="hdr-right">

      <div id="sync-dot" class="sync-dot" title="Sync status"></div>

  </div>
  <div id="progress-toast" class="progress-toast" role="status" aria-live="polite" aria-atomic="true" style="display:none">
    <div class="progress-toast-inner">
      <div class="progress-toast-spin" aria-hidden="true"></div>
      <span id="progress-toast-msg"></span>
    </div>
  </div>
  <div class="main" id="main"></div>
  <nav class="tabs">

    <button class="tab" id="t-setup" onclick="setTab('setup')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      Setup

    <button class="tab" id="t-help" onclick="setTab('help')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.1 9a3 3 0 015.8 1c0 2-3 2.2-3 4"/><line x1="12" y1="17" x2="12" y2="17"/></svg>
      Help

    <button class="tab" id="t-admin" onclick="setTab('admin')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2l3 4 5 .8-3.5 3.4.8 4.8L12 13l-5.3 2.9.8-4.8L4 6.8 9 6z"/><circle cx="12" cy="12" r="2.2"/></svg>
      Admin
    </button>
  </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────
const SB_URL = 'https://lzhawmvgkylumwcseltb.supabase.co';
const SB_KEY = 'sb_publishable_lVS5Yjtzu_t6c9LKDYTuLA_vGWL_gcC';

/**
 * Store context groundwork for multi-store support.
 * This release still defaults to one known store, but all persistence paths are now scoped.
 */
const STORE_DIRECTORY = Object.freeze([
  {id:'store_1406',slug:'store1406',name:'Store 1406',pin:'1406'}
]);
const ACTIVE_STORE_CTX_KEY = 'ck2_active_store_ctx';
let ACTIVE_STORE = STORE_DIRECTORY[0];
let STORE_PIN = ACTIVE_STORE.pin;
let SS_PIN_KEY = `ck2_pin_${ACTIVE_STORE.slug}`;
let LS_PREFIX = `ck2_${ACTIVE_STORE.slug}_`;
let STORE_LAYOUT_ROW_ID = `layout:${ACTIVE_STORE.id}`;
const LEGACY_LAYOUT_ROW_ID = 'global';
const DEFAULT_TRIAL_DAYS = 45;
const ADMIN_PIN = '9090';
const SS_ADMIN_KEY = 'ck2_admin_authed';

const SEED_ITEMS = [
  {id:'s1',name:'Hot Sausage',cat_l1:'Freezer',cat_l2:'Meats',par:3,unit:'cs',code:'CSY1001',upc:'',order_unit:'cs',order_pack_qty:1,reorder_trigger:null,sort_order:1},
  {id:'s2',name:'Mild Sausage',cat_l1:'Freezer',cat_l2:'Meats',par:3,unit:'cs',code:'CSY1002',upc:'',order_unit:'cs',order_pack_qty:1,reorder_trigger:null,sort_order:2},
  {id:'s3',name:'Pepperoni',cat_l1:'Freezer',cat_l2:'Meats',par:4,unit:'cs',code:'CSY1003',upc:'',order_unit:'cs',order_pack_qty:1,reorder_trigger:null,sort_order:3},
  {id:'s4',name:'Large Thin Crust',cat_l1:'Freezer',cat_l2:'Pizza Dough',par:2,unit:'cs',code:'CSY1010',upc:'',order_unit:'cs',order_pack_qty:1,reorder_trigger:null,sort_order:4},
  {id:'s5',name:'Small Thin Crust',cat_l1:'Freezer',cat_l2:'Pizza Dough',par:2,unit:'cs',code:'CSY1011',upc:'',order_unit:'cs',order_pack_qty:1,reorder_trigger:null,sort_order:5},
  {id:'s6',name:'Large Original',cat_l1:'Freezer',cat_l2:'Pizza Dough',par:3,unit:'cs',code:'CSY1012',upc:'',order_unit:'cs',order_pack_qty:1,reorder_trigger:null,sort_order:6},
  {id:'s7',name:'Provolone',cat_l1:'Cooler',cat_l2:'Cheese',par:5,unit:'bags',code:'CSY2001',upc:'',order_unit:'bags',order_pack_qty:1,reorder_trigger:null,sort_order:7},
  {id:'s8',name:'Mozzarella',cat_l1:'Cooler',cat_l2:'Cheese',par:4,unit:'bags',code:'CSY2002',upc:'',order_unit:'bags',order_pack_qty:1,reorder_trigger:null,sort_order:8},
  {id:'s9',name:'Pizza Sauce',cat_l1:'Dry',cat_l2:'Sauces',par:6,unit:'cans',code:'CSY3001',upc:'',order_unit:'cans',order_pack_qty:1,reorder_trigger:null,sort_order:9},
  {id:'s10',name:'Ranch Cups',cat_l1:'Dry',cat_l2:'Condiments',par:8,unit:'cs',code:'CSY3010',upc:'',order_unit:'cs',order_pack_qty:1,reorder_trigger:null,sort_order:10},
];

function scopedSeedItems(){
  return SEED_ITEMS.map(item=>{
    const rawId=String(item.id||'').trim();
    const scopedId=rawId.startsWith(ACTIVE_STORE.slug+':')?rawId:`${ACTIVE_STORE.slug}:${rawId}`;
    return {...item,id:scopedId,store_id:ACTIVE_STORE.id};
  });
}

function makeEntityId(kind){
  const prefix=`${ACTIVE_STORE.slug}:${kind}:`;
  try{
    if(typeof crypto!=='undefined'&&typeof crypto.randomUUID==='function'){
      return prefix+crypto.randomUUID();
    }
  }catch{}
  return prefix+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,10);
}

function itemScanCode(item){
  const upc=String(item?.upc||'').trim();
  if(upc) return upc;
  return String(item?.code||'').trim();
}

function itemCodeMeta(item){
  const upc=String(item?.upc||'').trim();
  const ord=String(item?.code||'').trim();
  if(upc&&ord) return `UPC ${upc} · Order ${ord}`;
  if(upc) return `UPC ${upc}`;
  if(ord) return `Order ${ord}`;
  return '';
}

function itemScanMeta(item){
  return itemCodeMeta(item);
}

function normalizeStoreCode(raw){
  return String(raw??'').replace(/\D/g,'').slice(0,8);
}

function normalizeStoreSlug(raw, code){
  const candidate=String(raw??'').trim().toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
  if(candidate) return candidate;
  return `store-${code}`;
}

function normalizeStoreCtx(raw){
  if(!raw||typeof raw!=='object') return null;
  const code=normalizeStoreCode(raw.store_code??raw.pin_code??raw.pin);
  if(!code) return null;
  const id=String(raw.id||`store_${code}`).trim()||`store_${code}`;
  const slug=normalizeStoreSlug(raw.slug,code);
  const name=String(raw.name||`Store ${code}`).trim()||`Store ${code}`;
  return {
    id,
    slug,
    name,
    pin: code,
    store_code: code
  };
}

function applyActiveStore(store, opts={}){
  const ctx=normalizeStoreCtx(store);
  if(!ctx) return false;
  ACTIVE_STORE=ctx;
  STORE_PIN=ctx.pin;
  SS_PIN_KEY=`ck2_pin_${ctx.slug}`;
  LS_PREFIX=`ck2_${ctx.slug}_`;
  STORE_LAYOUT_ROW_ID=`layout:${ctx.id}`;
  if(opts.persist!==false){
    try{ localStorage.setItem(ACTIVE_STORE_CTX_KEY,JSON.stringify(ctx)); }catch{}
    try{ sessionStorage.setItem(ACTIVE_STORE_CTX_KEY,JSON.stringify(ctx)); }catch{}
  }
  return true;
}

function restoreActiveStoreContext(){
  let parsed=null;
  try{
    const ss=sessionStorage.getItem(ACTIVE_STORE_CTX_KEY);
    if(ss) parsed=JSON.parse(ss);
  }catch{}
  if(!parsed){
    try{
      const lsRaw=localStorage.getItem(ACTIVE_STORE_CTX_KEY);
      if(lsRaw) parsed=JSON.parse(lsRaw);
    }catch{}
  }
  if(parsed) applyActiveStore(parsed,{persist:false});
}

// ─── SUPABASE ───────────────────────────────────────────────────────────────
let sb = null;
try { sb = supabase.createClient(SB_URL, SB_KEY); } catch(e) { console.warn('Supabase init failed', e); }

// ─── STATE ──────────────────────────────────────────────────────────────────
const S = {
  items: [], sessions: [], orders: [],
  draft: {}, expanded: {},
  tab: 'count',
  historyMode: false,
  editSessionId: null,
  editDraft: {},
  formView: null, formData: null, editItemId: null,
  syncing: false, syncError: null, dbReady: false,
  dbSupportsStoreScope: false,
  dbSupportsBilling: false,
  billingCtx: null,
  featureAccess: {count:true,ordering:true,receive:true,usage:true,source:'legacy'},
  adminAuthed: false,
  adminSnapshot: null,
  adminError: null,
  progressMessage: null,
  progressOnly: false,
  installPrompt: null,
  testResults: null,
  countView: 'list',
  walkIndex: 0,
  orderView: 'list',
  /** Full list: when true, rows marked scanned are hidden from the list (default on) */
  orderListHideScanned: true,
  orderWalkIndex: 0,
  /** When false and there are no saved sessions yet, the start-count modal is shown. After the first count exists, this stays true when on Count. */
  countFormActive: false,
  /** Count tab: show manual “extra for truck order” UI (toggled via header cog) */
  countManualOrderOpen: false,
  /** Setup tab: show database status & tests (hidden by default) */
  showDeveloperInfo: false,
  /** Setup tab: inline quick edit for item order code */
  setupCodeEditId: null,
  setupCodeDraft: '',
  setupCodeSavingId: null,
  setupCodeLastTapId: null,
  setupCodeLastTapAt: 0,
  /** Client-local order code rendering mode: qr | qr8 | barcode */
  barcodeMode: 'qr',
};

function attachStoreScope(row){
  const next={...row};
  if(S.dbSupportsStoreScope){
    next.store_id=ACTIVE_STORE.id;
  }else if(Object.prototype.hasOwnProperty.call(next,'store_id')){
    delete next.store_id;
  }
  return next;
}

function scopeByStore(query){
  if(!S.dbSupportsStoreScope) return query;
  return query.eq('store_id',ACTIVE_STORE.id);
}

// ─── LOCALSTORAGE CACHE ─────────────────────────────────────────────────────
const ls = {
  get(k){ try{ const v=localStorage.getItem(LS_PREFIX+k); return v?JSON.parse(v):null; }catch{ return null; }},
  set(k,v){ try{ localStorage.setItem(LS_PREFIX+k,JSON.stringify(v)); }catch{} }
};

const BARCODE_MODE_OPTS={
  qr:'Normal QR code',
  qr8:'8-bit QR code',
  barcode:'Normal barcode'
};

function normalizeBarcodeMode(v){
  const key=String(v||'').trim().toLowerCase();
  return Object.prototype.hasOwnProperty.call(BARCODE_MODE_OPTS,key)?key:'qr';
}

function loadBarcodeModeSetting(){
  const saved=ls.get('barcodeMode');
  S.barcodeMode=normalizeBarcodeMode(saved);
}

function setBarcodeMode(mode){
  const next=normalizeBarcodeMode(mode);
  if(next===S.barcodeMode) return;
  S.barcodeMode=next;
  ls.set('barcodeMode',next);
  render();
}

// ─── DATABASE LAYER ─────────────────────────────────────────────────────────
const db = {
  async checkTables(){
    if(!sb) return false;
    try{
      const {error} = await sb.from('ck_items').select('id').limit(1);
      if(error){
        S.dbSupportsStoreScope=false;
        S.dbSupportsBilling=false;
        return false;
      }
      try{
        const {error:storeScopeErr} = await sb.from('ck_items').select('store_id').limit(1);
        S.dbSupportsStoreScope=!storeScopeErr;
      }catch{
        S.dbSupportsStoreScope=false;
      }
      try{
        const {error:billingErr} = await sb.from('ck_stores').select('id').limit(1);
        S.dbSupportsBilling=!billingErr;
      }catch{
        S.dbSupportsBilling=false;
      }
      return true;
    }catch{ return false; }
  },

  async loadAll(){
    if(!sb) throw new Error('No database connection');
    const CK=window.__CK_LOGIC;
    if(!CK) throw new Error('App logic not loaded');
    // Load items
    let itemsQuery=sb.from('ck_items').select('*');
    itemsQuery=scopeByStore(itemsQuery);
    const {data:items,error:ie} = await itemsQuery.order('sort_order');
    if(ie) throw ie;
    // Bounded history: avoids loading years of ck_counts / ck_order_items into RAM + localStorage.
    const capS=CK.LOAD_CAP_SESSIONS;
    const capO=CK.LOAD_CAP_ORDERS;
    let sessionsQuery=sb.from('ck_sessions').select('*');
    sessionsQuery=scopeByStore(sessionsQuery);
    const {data:sessions,error:se} = await sessionsQuery.order('counted_at',{ascending:false}).limit(capS);
    if(se) throw se;
    const sessArr=sessions||[];
    const sessionIds=sessArr.map(s=>s.id);
    let counts=[];
    if(sessionIds.length){
      let countsQuery=sb.from('ck_counts').select('*').in('session_id',sessionIds);
      countsQuery=scopeByStore(countsQuery);
      const {data:ce,error:ceErr}=await countsQuery;
      if(ceErr) throw ceErr;
      counts=ce||[];
    }
    let ordersQuery=sb.from('ck_orders').select('*');
    ordersQuery=scopeByStore(ordersQuery);
    const {data:orders,error:oe} = await ordersQuery.order('ordered_at',{ascending:false}).limit(capO);
    if(oe) throw oe;
    const ordArr=orders||[];
    const orderIds=ordArr.map(o=>o.id);
    let oitems=[];
    if(orderIds.length){
      let orderItemsQuery=sb.from('ck_order_items').select('*').in('order_id',orderIds);
      orderItemsQuery=scopeByStore(orderItemsQuery);
      const {data:oie,error:oieErr}=await orderItemsQuery;
      if(oieErr) throw oieErr;
      oitems=oie||[];
    }
    return {
      items: items||[],
      sessions: CK.denormalizeSessions(sessArr,counts),
      orders: CK.denormalizeOrders(ordArr,oitems)
    };
  },

  async confirmReceipt(orderId, receivedMap, lineItems){
    const receivedAt=new Date().toISOString();
    let oq=sb.from('ck_orders').update({status:'received',received_at:receivedAt}).eq('id',orderId);
    oq=scopeByStore(oq);
    const {error:oe} = await oq;
    if(oe) throw oe;
    const lines=lineItems&&typeof lineItems==='object'?lineItems:{};
    const entries=Object.entries(lines);
    if(!entries.length) return;
    const CK=window.__CK_LOGIC;
    if(!CK) throw new Error('App logic not loaded');
    for(const [item_id,data] of entries){
      const raw=receivedMap&&Object.prototype.hasOwnProperty.call(receivedMap,item_id)?receivedMap[item_id]:data?.recommended;
      const received=CK.normalizeReceivedQuantity(raw,data?.recommended);
      const rec=parseFloat(data&&data.recommended);
      const recommended=Number.isFinite(rec)?rec:0;
      const {error}=await sb.from('ck_order_items').upsert(
        attachStoreScope({order_id:orderId,item_id,recommended,received}),
        {onConflict:'order_id,item_id'}
      );
      if(error) throw error;
    }
  },

      store_id:storeId,
      amount_cents:amountCents,
      reason:String(row.reason||'').trim()||'admin_refund',
      status:String(row.status||'succeeded').trim()||'succeeded',
      created_by:String(row.created_by||'admin_console').trim()||'admin_console',
      created_at:nowIso
    };
    const {error:refundErr}=await sb.from('ck_refunds').insert(refund);

    await db.adminLogEvent({

      details:{

// ─── SYNC HELPERS ───────────────────────────────────────────────────────────
function isAppBusy(){ return S.syncing || S.progressOnly; }

function updateProgressToast(){
  const wrap=document.getElementById('progress-toast');
  const msgEl=document.getElementById('progress-toast-msg');
  const main=document.getElementById('main');
  const show=isAppBusy()&&S.progressMessage;
  if(wrap){
    wrap.style.display=show?'block':'none';
    if(msgEl&&S.progressMessage) msgEl.textContent=S.progressMessage;
  }
  if(main) main.classList.toggle('ck-busy',!!show);
}

/** Optional message shows in the progress strip so users do not double-submit */
function setSyncing(v, msg){
  S.syncing=!!v;
  S.syncError=null;
  if(v){
    S.progressOnly=false;
    S.progressMessage=msg||'Saving…';
  }else{
    S.progressMessage=null;
    S.progressOnly=false;
  }
  updateSyncDot();
  updateProgressToast();
}

function setSyncErr(msg){
  S.syncing=false;
  S.syncError=msg;
  S.progressMessage=null;
  S.progressOnly=false;
  updateSyncDot();
  updateProgressToast();
}

function setSyncOk(){
  S.syncing=false;
  S.syncError=null;
  S.progressMessage=null;
  S.progressOnly=false;
  updateSyncDot();
  updateProgressToast();
}

/** Progress UI without treating as cloud “sync” (e.g. local tests). */
function setProgressOnly(on, msg){
  S.progressOnly=!!on;
  S.progressMessage=on?(msg||'Working…'):null;
  if(on) S.syncing=false;
  updateSyncDot();
  updateProgressToast();
}

function updateSyncDot(){
  const d=document.getElementById('sync-dot');
  if(!d) return;
  if(S.syncing||S.progressOnly){ d.className='sync-dot spin'; d.title=S.syncing?'Syncing…':'Working…'; }
  else if(S.syncError){ d.className='sync-dot err'; d.title='Sync error: '+S.syncError; }
  else { d.className='sync-dot ok'; d.title='Synced'; }
}

  if(!code) return null;
  try{
    const {data,error}=await sb.from('ck_stores').select('*').eq('store_code',code).maybeSingle();
    if(error) return null;
    return normalizeStoreCtx(data);
  }catch{
    return null;
  }
}

async function signupStore(){
  const nameEl=document.getElementById('signup-store-name');
  const codeEl=document.getElementById('signup-store-code');
  const errEl=document.getElementById('signup-err');
  const rawName=(nameEl&&nameEl.value)||'';
  const rawCode=(codeEl&&codeEl.value)||'';
  const storeName=String(rawName).trim();
  const storeCode=normalizeStoreCode(rawCode);
  if(!storeName){
    if(errEl) errEl.textContent='Store name is required.';
    return;
  }
  if(storeCode.length<4){
    if(errEl) errEl.textContent='Store code must be at least 4 digits.';
    return;
  }
  if(!sb){
    if(errEl) errEl.textContent='Database unavailable. Try again after reconnecting.';
    return;
  }
  if(errEl) errEl.textContent='';
  const slug=normalizeStoreSlug(storeName,storeCode);
  const storeId=`store_${storeCode}`;
  const nowIso=new Date().toISOString();
  try{
    const existing=await fetchStoreByCode(storeCode);
    if(existing){
      applyActiveStore(existing);
    }else{
      const storeRow={
        id:storeId,
        slug,
        name:storeName,
        store_code:storeCode,
        pin_code:storeCode,
        trial_days:DEFAULT_TRIAL_DAYS
      };
      const acctId=`acct_${storeCode}`;
      const acctRow={
        id:acctId,
        name:storeName,
        owner_email:null,
        status:'active'
      };
      const subRow={
        account_id:acctId,
        store_id:storeId,
        plan_code:'ordering_usage',
        status:'trialing',
        trial_started_at:nowIso,
        trial_ends_at:new Date(Date.now()+DEFAULT_TRIAL_DAYS*24*60*60*1000).toISOString()
      };
      const {error:acctErr}=await sb.from('ck_accounts').upsert(acctRow,{onConflict:'id'});
      if(acctErr) throw acctErr;
      const {error:storeErr}=await sb.from('ck_stores').upsert(storeRow,{onConflict:'id'});
      if(storeErr) throw storeErr;
      const {error:linkErr}=await sb.from('ck_account_stores').upsert({
        account_id:acctId,
        store_id:storeId,
        role:'owner',
        created_at:nowIso
      },{onConflict:'account_id,store_id'});
      if(linkErr) throw linkErr;
      const {error:subErr}=await sb.from('ck_subscriptions').upsert(subRow,{onConflict:'account_id,store_id,plan_code'});
      if(subErr) throw subErr;
      applyActiveStore(normalizeStoreCtx(storeRow));
    }
    try{ sessionStorage.setItem(SS_PIN_KEY,'1'); }catch{}
    hidePinOverlay();
    const ov=document.getElementById('loading-overlay');
    const lm=document.getElementById('loading-msg');
    if(ov) ov.style.display='flex';
    if(lm) lm.textContent='Setting up store…';
    await finishBoot();
  }catch(e){
    if(errEl) errEl.textContent=e&&e.message?e.message:'Unable to create store right now.';
  }finally{
    const ov=document.getElementById('loading-overlay');
    if(ov) ov.style.display='none';
  }
}

async function submitStorePin(){
  const input=document.getElementById('pin-input');
  const errEl=document.getElementById('pin-err');
  const raw=(input&&input.value)||'';
  const v=normalizeStoreCode(raw);
  if(input) input.value=v;
  if(v.length<4){
    if(errEl) errEl.textContent='Enter your Casey\'s store code.';
    return;
  }
  const store=await fetchStoreByCode(v);
  if(!store){
    if(errEl) errEl.textContent='Store not found. Use "Sign up new store".';
    if(input) input.value='';
    focusStorePinInput();
    return;
  }
  applyActiveStore(store);
  if(v!==STORE_PIN){
    if(errEl) errEl.textContent='Incorrect PIN.';
    if(input) input.value='';
    focusStorePinInput();
    return;
  }
  if(errEl) errEl.textContent='';
  try{ sessionStorage.setItem(SS_PIN_KEY,'1'); }catch{}
  hidePinOverlay();
  const ov=document.getElementById('loading-overlay');
  const lm=document.getElementById('loading-msg');
  if(ov) ov.style.display='flex';
  if(lm) lm.textContent='Connecting to database…';
  try{
    await finishBoot();
  }finally{
    if(ov) ov.style.display='none';
  }
}

// ─── SCHEDULE HELPERS ───────────────────────────────────────────────────────
function nextWeekday(dayOfWeek, hour, minute){
  const now = new Date();
  const d = new Date(now);
  let diff = (dayOfWeek - now.getDay() + 7) % 7;
  if(diff===0){
    const target = new Date(now);
    target.setHours(hour,minute,0,0);
    if(now >= target) diff = 7;
  }
  d.setDate(now.getDate()+diff);
  d.setHours(hour,minute,0,0);
  return d;
}
function getOrderDeadline(){ return nextWeekday(4,14,0); } // Thursday 2pm
function getTruckArrival(){ return nextWeekday(1,7,0); }   // Monday 7am

function fmtCountdown(ms){
  if(ms<=0) return 'Now';
  const h = Math.floor(ms/3600000);
  const d = Math.floor(h/24);
  const rh = h%24;
  const m = Math.floor((ms%3600000)/60000);
  if(d>0) return d+'d '+rh+'h';
  if(h>0) return h+'h '+m+'m';
  return m+'m';
}
function fmtDate(iso){ return new Date(iso).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}); }
function fmtTime(iso){ return new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }
function fmtDateTime(iso){ return new Date(iso).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}); }

function fmtMoneyCents(cents){
  const n=Number(cents)||0;
  return '$'+(n/100).toFixed(2);
}

function fmtAuditDate(iso){
  if(!iso) return '—';
  try{ return fmtDateTime(iso); }catch{ return String(iso); }
}
function escapeHtml(s){
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function stickyFooterCopyright(){
  const y=new Date().getFullYear();
  return `<div class="sticky-footer-copy">© ${y} Matthew Dunham · <a href="mailto:send_me_letters@hotmail.com">send_me_letters@hotmail.com</a></div>`;
}

function safeJson(v){
  try{ return JSON.stringify(v||{},null,2); }catch{ return '{}'; }
}

function planPriceLabel(sub, priceBook){
  const plan=String(sub&&sub.plan_code||'').trim();
  const directCents=Number(sub&&sub.price_cents);
  const directCurrency=String(sub&&sub.currency||'usd').toUpperCase();
  if(Number.isFinite(directCents)&&directCents>0) return `${directCurrency} ${(directCents/100).toFixed(2)}`;
  const match=(priceBook||[]).find(p=>String(p.plan_code||'').trim()===plan && p.active!==false);
  if(!match) return '—';
  const cents=Number(match.price_cents);
  if(!Number.isFinite(cents)||cents<=0) return '—';
  const cur=String(match.currency||'usd').toUpperCase();
  return `${cur} ${(cents/100).toFixed(2)}`;
}

/** Safe for double-quoted onclick="fn(...)" — avoids nested " breaking the attribute */
function encAttr(v){
  return encodeURIComponent(JSON.stringify(v));
}

function updateScheduleChip(){
  const chip = document.getElementById('sched-chip');
  if(!chip) return;
  const now = new Date();
  const deadline = getOrderDeadline();
  const ms = deadline - now;
  const hrs = ms/3600000;
  const txt = fmtCountdown(ms)+' to order';
  chip.textContent = txt;
  chip.className = 'chip '+(hrs<6?'chip-danger':hrs<24?'chip-warn':'chip-ok');
}

// ─── ORDERED GROUPS (category › subcategory › items) ─────────────────────────
const EK1 = (l1)=>'1:'+l1;
const EK2 = (l1,l2)=>'2:'+l1+'||'+l2;
function groupKey(l1,l2){ return (l1||'Other')+'||'+(l2||'General'); }

function discoverGroups(items){
  const map={};
  items.forEach(i=>{
    const l1=i.cat_l1||'Other', l2=i.cat_l2||'General';
    if(!map[l1]) map[l1]={};
    if(!map[l1][l2]) map[l1][l2]=[];
    map[l1][l2].push(i);
  });
  return map;
}

function minSortInBucket(bucketItems){
  let m=Infinity;
  bucketItems.forEach(i=>{
    const s=parseFloat(i.sort_order);
    if(Number.isFinite(s)&&s<m) m=s;
  });
  return m===Infinity?0:m;
}

function loadLayout(){
  const v=ls.get('layout');
  if(v&&typeof v==='object') return {catOrder:v.catOrder||[],subOrder:v.subOrder||{},groupItemOrder:v.groupItemOrder||{}};
  return {catOrder:[],subOrder:{},groupItemOrder:{}};
}

let layoutPushTimer=null;
function normalizeLayoutObj(v){
  if(!v||typeof v!=='object') return {catOrder:[],subOrder:{},groupItemOrder:{}};
  return {catOrder:v.catOrder||[],subOrder:v.subOrder||{},groupItemOrder:v.groupItemOrder||{}};
}
function layoutHasCustomOrder(L){
  const n=normalizeLayoutObj(L);
  if(Array.isArray(n.catOrder)&&n.catOrder.length) return true;
  if(n.subOrder&&typeof n.subOrder==='object'&&Object.keys(n.subOrder).length) return true;
  if(n.groupItemOrder&&typeof n.groupItemOrder==='object'&&Object.keys(n.groupItemOrder).length) return true;
  return false;
}

function layoutPushMsGet(){
  try{ return parseInt(localStorage.getItem(LS_PREFIX+'layoutPushMs')||'0',10)||0; }catch{ return 0; }
}
function layoutPushMsSet(ms){
  try{ localStorage.setItem(LS_PREFIX+'layoutPushMs',String(ms)); }catch{}
}

async function mergeLayoutFromRemote(){
  if(!sb||!S.dbReady) return;
  try{
    const row=await db.loadLayoutRow();
    const remote=row&&row.layout;
    const remoteMs=row&&row.updated_at ? new Date(row.updated_at).getTime() : 0;
    const local=ls.get('layout');
    const localHas=local&&layoutHasCustomOrder(local);
    const remoteHas=remote&&layoutHasCustomOrder(remote);
    if(remoteHas){
      if(!localHas){
        ls.set('layout',normalizeLayoutObj(remote));
        layoutPushMsSet(remoteMs);
        return;
      }
      const lastPush=layoutPushMsGet();
      if(remoteMs>=lastPush-2500){
        ls.set('layout',normalizeLayoutObj(remote));
        layoutPushMsSet(remoteMs);
        return;
      }
    }
    if(localHas){
      const ms=await db.upsertLayout(normalizeLayoutObj(local));
      if(ms!=null) layoutPushMsSet(ms);
    }
  }catch(e){
    console.warn('mergeLayoutFromRemote',e);
  }
}

async function pushLayoutToDb(){
  if(!sb||!S.dbReady) return;
  const L=normalizeLayoutObj(loadLayout());
  try{
    const ms=await db.upsertLayout(L);
    if(ms!=null) layoutPushMsSet(ms);
  }catch(e){
    console.warn('layout sync',e);
  }
}

function scheduleLayoutPush(){
  if(!sb||!S.dbReady) return;
  if(layoutPushTimer) clearTimeout(layoutPushTimer);
  layoutPushTimer=setTimeout(()=>{
    layoutPushTimer=null;
    void pushLayoutToDb();
  },500);
}

function flushLayoutPushIfPending(){
  if(!layoutPushTimer) return;
  clearTimeout(layoutPushTimer);
  layoutPushTimer=null;
  void pushLayoutToDb();
}

function saveLayout(L){
  ls.set('layout',L);
  scheduleLayoutPush();
}

function ensureLayoutFromItems(items){
  const map=discoverGroups(items);
  const L0=loadLayout();
  const allL1=Object.keys(map);
  const defaultL1=allL1.slice().sort((a,b)=>
    minSortInBucket(Object.values(map[a]).flat())-minSortInBucket(Object.values(map[b]).flat())||String(a).localeCompare(String(b))
  );
  const seen1=new Set();
  const catOrder=[];
  (L0.catOrder||[]).forEach(x=>{ if(map[x]&&!seen1.has(x)){ seen1.add(x); catOrder.push(x); }});
  defaultL1.forEach(x=>{ if(!seen1.has(x)){ seen1.add(x); catOrder.push(x); }});

  const subOrder={...L0.subOrder};
  catOrder.forEach(l1=>{
    const subs=Object.keys(map[l1]||{});
    const defSub=subs.slice().sort((a,b)=>
      minSortInBucket(map[l1][a])-minSortInBucket(map[l1][b])||String(a).localeCompare(String(b))
    );
    const seen2=new Set();
    const merged=[];
    (subOrder[l1]||[]).forEach(x=>{ if(map[l1]&&map[l1][x]&&!seen2.has(x)){ seen2.add(x); merged.push(x); }});
    defSub.forEach(x=>{ if(!seen2.has(x)){ seen2.add(x); merged.push(x); }});
    subOrder[l1]=merged;
  });

  const groupItemOrder={...L0.groupItemOrder};
  catOrder.forEach(l1=>{
    (subOrder[l1]||[]).forEach(l2=>{
      if(!map[l1]||!map[l1][l2]) return;
      const bucket=map[l1][l2];
      const k=groupKey(l1,l2);
      const defIds=bucket.slice().sort((a,b)=>{
        const sa=parseFloat(a.sort_order),sb=parseFloat(b.sort_order);
        if(Number.isFinite(sa)&&Number.isFinite(sb)&&sa!==sb) return sa-sb;
        return String(a.name||'').localeCompare(String(b.name||''));
      }).map(i=>i.id);
      const seen3=new Set();
      const mergedIds=[];
      (groupItemOrder[k]||[]).forEach(id=>{
        if(bucket.some(i=>i.id===id)&&!seen3.has(id)){ seen3.add(id); mergedIds.push(id); }
      });
      defIds.forEach(id=>{ if(!seen3.has(id)){ seen3.add(id); mergedIds.push(id); }});
      groupItemOrder[k]=mergedIds;
    });
  });

  const next={catOrder,subOrder,groupItemOrder};
  if(JSON.stringify(next)!==JSON.stringify(L0)) saveLayout(next);
  return next;
}

function getOrderedGroups(items){
  const layout=ensureLayoutFromItems(items);
  const map=discoverGroups(items);
  const byId={};
  items.forEach(i=>{ byId[i.id]=i; });
  return layout.catOrder.filter(l1=>map[l1]).map(l1=>({
    l1,
    subs:(layout.subOrder[l1]||[]).filter(l2=>map[l1]&&map[l1][l2]).map(l2=>{
      const ids=layout.groupItemOrder[groupKey(l1,l2)]||[];
      const rowItems=ids.map(id=>byId[id]).filter(Boolean);
      return {l2,items:rowItems};
    }).filter(s=>s.items.length)
  })).filter(g=>g.subs.length);
}

function flattenWalkItems(groups){
  const flat=[];
  groups.forEach(g=>g.subs.forEach(s=>s.items.forEach(i=>flat.push(i))));
  return flat;
}

function moveL1(l1,dir){
  ensureLayoutFromItems(S.items);
  const L=loadLayout();
  const arr=[...L.catOrder];
  const i=arr.indexOf(l1);
  const j=i+dir;
  if(i<0||j<0||j>=arr.length) return;
  [arr[i],arr[j]]=[arr[j],arr[i]];
  L.catOrder=arr;
  saveLayout(L);
  render();
}

function moveL2(l1,l2,dir){
  ensureLayoutFromItems(S.items);
  const L=loadLayout();
  const arr=[...(L.subOrder[l1]||[])];
  const i=arr.indexOf(l2);
  const j=i+dir;
  if(i<0||j<0||j>=arr.length) return;
  [arr[i],arr[j]]=[arr[j],arr[i]];
  L.subOrder[l1]=arr;
  saveLayout(L);
  render();
}

function moveItemInGroup(l1,l2,id,dir){
  ensureLayoutFromItems(S.items);
  const L=loadLayout();
  const k=groupKey(l1,l2);
  const arr=[...(L.groupItemOrder[k]||[])];
  const i=arr.indexOf(id);
  const j=i+dir;
  if(i<0||j<0||j>=arr.length) return;
  [arr[i],arr[j]]=[arr[j],arr[i]];
  L.groupItemOrder[k]=arr;
  saveLayout(L);
  render();
}

// ─── USAGE ANALYTICS ────────────────────────────────────────────────────────
/** Monday-start calendar week key `YYYY-MM-DD` (local) for grouping usage */
function usageWeekKeyFromDate(d){
  const x = new Date(d instanceof Date?d.getTime():new Date(d).getTime());
  x.setHours(0,0,0,0);
  const wd = x.getDay();
  const off = wd === 0 ? -6 : 1 - wd;
  x.setDate(x.getDate() + off);
  const y = x.getFullYear();
  const m = String(x.getMonth() + 1).padStart(2, '0');
  const da = String(x.getDate()).padStart(2, '0');
  return `${y}-${m}-${da}`;
}

function usageWeekLabel(weekKey){
  const start = new Date(weekKey + 'T12:00:00');
  const end = new Date(start);
  end.setDate(end.getDate() + 6);
  const a = start.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  const b = end.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  return `${a} – ${b}`;
}

function computeUsage(){
  const result={};
  S.items.forEach(item=>{
    result[item.id] = { ...item, usages: [], byWeek: {}, avg: null, avgWeekly: null, weekKeys: [] };
  });
  const receivedOrders = S.orders.filter(o=>o.status==='received');
  receivedOrders.forEach(order=>{
    const before = S.sessions.find(s=>s.id===order.session_id);
    if(!before) return;
    const recvDate = new Date(order.received_at||order.ordered_at);
    const after = [...S.sessions]
      .sort((a,b)=>new Date(a.counted_at)-new Date(b.counted_at))
      .find(s=>new Date(s.counted_at)>recvDate);
    if(!after) return;
    const wk = usageWeekKeyFromDate(recvDate);
    S.items.forEach(item=>{
      const inOrder = item.id in order.items;
      const inCounts = item.id in before.counts;
      if(!inOrder && !inCounts) return; // no meaningful data for this item
      const b = parseFloat(before.counts[item.id])||0;
      const rOrd = parseFloat(order.items[item.id]?.received)||0;
      const a = parseFloat(after.counts[item.id])||0;
      const used = b + rOrd - a;
      if(used >= 0){
        result[item.id].usages.push(used);
        const row = result[item.id].byWeek;
        row[wk] = (row[wk] || 0) + used;
      }
    });
  });
  Object.values(result).forEach(r=>{
    if(!r.usages.length) return;
    r.avg = r.usages.reduce((a,b)=>a+b,0) / r.usages.length;
    r.weekKeys = Object.keys(r.byWeek).sort();
    r.avgWeekly = r.weekKeys.length ? r.weekKeys.reduce((s,k)=>s+r.byWeek[k],0) / r.weekKeys.length : null;
  });
  return result;
}

/** Distinct calendar weeks (newest first) with per-item usage for that week */
function buildUsageWeekRollup(usage){
  const byWeek = {};
  Object.values(usage).forEach(u=>{
    if(!u.weekKeys || !u.weekKeys.length) return;
    u.weekKeys.forEach(wk=>{
      if(!byWeek[wk]) byWeek[wk] = [];
      byWeek[wk].push({
        id: u.id,
        name: u.name,
        unit: u.unit,
        used: u.byWeek[wk],
        par: u.par,
      });
    });
  });
  return Object.keys(byWeek)
    .sort()
    .reverse()
    .map(wk=>({
      weekKey: wk,
      label: usageWeekLabel(wk),
      lines: byWeek[wk].sort((a,b)=>b.used - a.used),
    }));
}

function getOrderManualAdj(){ return ls.get('orderManualAdj')||{}; }

function setOrderManualAdj(map){ ls.set('orderManualAdj', map||{}); }

function clearOrderManualAdj(){ setOrderManualAdj({}); }

/** Half-increments to match 0.5 count steps (see lib/ck-logic.mjs + tests) */
function roundOrderAdj(n){

}

function bumpOrderManualAdj(itemId, delta){
  const o={...getOrderManualAdj()};
  let cur=parseFloat(o[itemId]);
  if(!Number.isFinite(cur)) cur=0;
  cur=roundOrderAdj(cur+delta);
  if(cur===0) delete o[itemId];
  else o[itemId]=cur;
  setOrderManualAdj(o);
  render();
}

function fmtManualAdj(adj){

}

function countDraftOnHand(itemId){

  if(v===undefined||v===''||String(v).trim()==='') return null;

}

function parBasedToOrder(item, onHand){

function itemOrderUnitLabel(item){

function computeOrder(){
  if(!S.sessions.length) return [];
  const last=S.sessions[0];
  const sortIds=flattenWalkItems(getOrderedGroups(S.items)).map(i=>i.id);
  return window.__CK_LOGIC.computeOrderLines(S.items, last.counts||{}, getOrderManualAdj(), sortIds);
}

/** Session-scoped “do not include on this recommended order” (until logged or cleared). */
const LS_ORDER_REC_EXCLUDED='orderRecExcluded';

function pruneOrderRecExcludedMap(){
  if(!S.sessions||!S.sessions.length) return;
  const m=ls.get(LS_ORDER_REC_EXCLUDED);
  if(!m||typeof m!=='object') return;
  const valid=new Set(S.sessions.map(s=>s.id));
  let changed=false;
  const next={...m};
  for(const k of Object.keys(next)){
    if(!valid.has(k)){ delete next[k]; changed=true; }
  }
  if(changed) ls.set(LS_ORDER_REC_EXCLUDED,next);
}

function getOrderRecExcludedSet(){
  pruneOrderRecExcludedMap();
  const sid=S.sessions[0]?.id;
  if(!sid) return new Set();
  const m=ls.get(LS_ORDER_REC_EXCLUDED)||{};
  const arr=m[sid];
  return new Set(Array.isArray(arr)?arr:[]);
}

/** Recommended lines for the Order tab and “Log order” — same as computeOrder minus user-removed lines. */
function recommendedOrderLines(){
  const ex=getOrderRecExcludedSet();
  return computeOrder().filter(it=>!ex.has(it.id));
}

/** Lines shown on Order (walk/list/QR/acks): full reco while a pending order exists for reference; otherwise respects removals. */
function orderTabLineItems(){
  if(pendingOrderForLatestCount()) return computeOrder();
  return recommendedOrderLines();
}

function persistOrderRecExcludedSet(exSet){
  const sid=S.sessions[0]?.id;
  if(!sid) return;
  const m={...(ls.get(LS_ORDER_REC_EXCLUDED)||{})};
  if(exSet.size) m[sid]=[...exSet];
  else delete m[sid];
  ls.set(LS_ORDER_REC_EXCLUDED,m);
}

function excludeRecommendedLine(itemId){
  if(!S.sessions.length||pendingOrderForLatestCount()) return;
  const raw=computeOrder();
  if(!raw.some(i=>i.id===itemId)) return;
  const ex=getOrderRecExcludedSet();
  ex.add(itemId);
  persistOrderRecExcludedSet(ex);
  const n=recommendedOrderLines().length;
  if(S.orderView==='walk'){
    if(!n){ S.orderView='list'; S.orderWalkIndex=0; }
    else S.orderWalkIndex=Math.max(0,Math.min(S.orderWalkIndex,n-1));
  }
  render();
}

function restoreRecommendedLine(itemId){
  if(!S.sessions.length) return;
  const ex=getOrderRecExcludedSet();
  if(!ex.has(itemId)) return;
  ex.delete(itemId);
  persistOrderRecExcludedSet(ex);
  render();
}

function clearOrderRecExcludedForSession(sessionId){
  if(!sessionId) return;
  const m={...(ls.get(LS_ORDER_REC_EXCLUDED)||{})};
  if(!m[sessionId]) return;
  delete m[sessionId];
  ls.set(LS_ORDER_REC_EXCLUDED,m);
}

// ─── ORDER TAB HELPERS (ack toggles + list/walk) ─────────────────────────────
function orderRecSig(items){
  return items.map(i=>i.id+':'+i.toOrder).join(',');
}

function getOrderAckFlags(items){
  const sig=orderRecSig(items);
  const st=ls.get('orderAck');
  if(!st||st.sig!==sig||typeof st.flags!=='object') return {};
  return {...st.flags};
}

function setOrderListHideScanned(v){
  S.orderListHideScanned=!!v;
  render();
}

function toggleOrderAck(itemId){
  const items=orderTabLineItems();
  if(!items.some(i=>i.id===itemId)) return;
  const sig=orderRecSig(items);
  const cur=getOrderAckFlags(items);
  const wasAcked=!!cur[itemId];
  const next={...cur};
  if(next[itemId]) delete next[itemId];
  else next[itemId]=true;
  ls.set('orderAck',{sig,flags:next});
  const markedScanned=!wasAcked&&!!next[itemId];
  if(markedScanned&&S.tab==='order'&&S.orderView==='walk'){
    const i=items.findIndex(x=>x.id===itemId);
    if(i===S.orderWalkIndex&&i<items.length-1) S.orderWalkIndex=i+1;
  }
  render();
}

function setOrderView(mode){
  S.orderView=mode;
  const oi=orderTabLineItems();
  if(mode==='walk'){
    if(!oi.length){ S.orderView='list'; render(); return; }
    S.orderWalkIndex=Math.max(0,Math.min(S.orderWalkIndex,oi.length-1));
  }
  render();
  if(mode==='walk') scheduleDrawBarcodes();
}

function orderWalkGo(delta){
  const oi=orderTabLineItems();
  if(!oi.length) return;
  S.orderWalkIndex=Math.max(0,Math.min(oi.length-1,S.orderWalkIndex+delta));
  render();
  scheduleDrawBarcodes();
}

function orderWalkPick(ix){
  const oi=orderTabLineItems();
  const n=parseInt(ix,10);
  if(!Number.isFinite(n)||n<0||n>=oi.length) return;
  S.orderWalkIndex=n;
  render();
  scheduleDrawBarcodes();
}

/** Pending order row tied to the most recent inventory count */
function pendingOrderForLatestCount(){
  if(!S.sessions.length) return null;
  const sid=S.sessions[0].id;
  return S.orders.find(o=>o.status==='pending'&&o.session_id===sid)||null;
}

/** Remove a pending (not yet received) order by id — used from Order and Receive tabs */
async function deletePendingOrderById(orderId, confirmMessage){
  const ord=S.orders.find(o=>o.id===orderId&&o.status==='pending');
  if(!ord) return;
  const msg=confirmMessage||'Delete this pending order? You can place a new one from the Order tab when ready.';
  if(!confirm(msg)) return;
  if(isAppBusy()) return;
  try{
    setSyncing(true,'Removing order…');
    await db.deleteOrder(orderId);
    S.orders=S.orders.filter(o=>o.id!==orderId);
    ls.set('orders',S.orders);
    setSyncOk();
    try{ ls.set('orderAck',null); }catch{}
    showBanner('Pending order removed.','ok');
    render();
  }catch(e){
    setSyncErr(e.message);
    render();
  }
}

async function deletePendingOrderForLatest(){
  const po=pendingOrderForLatestCount();
  if(!po) return;
  await deletePendingOrderById(po.id,'Delete this pending order? You can log a new order from the same count afterward.');
}

/*
  UI architecture (single index.html): all screens are string-built HTML assigned to #main.innerHTML
  on each render(). That pattern is simple but re-parses the whole main column on every state change,
  which is the main source of “lag” on slower phones. Mitigations in this file: debounced barcode
  generation (small QR codes via qrcodejs), guarding heavy work to the active tab, and keeping renders purposeful (no extra polls).
  Data sync: db.loadAll() pulls only the newest LOAD_CAP_SESSIONS sessions and LOAD_CAP_ORDERS orders (see lib/ck-logic.mjs),
  with counts/order_items restricted to those ids — so months or years of history do not blow RAM or the ~5MB localStorage mirror.
  Larger wins later: incremental DOM updates, a small component layer, or virtualizing long Setup lists.
*/
let __drawBcTimer=null;
function scheduleDrawBarcodes(){
  if(__drawBcTimer) clearTimeout(__drawBcTimer);
  if(S.tab!=='order') return;
  __drawBcTimer=setTimeout(()=>{
    __drawBcTimer=null;
    requestAnimationFrame(()=>{
      if(S.tab==='order') drawBarcodes();
    });
  }, 90);
}

// ─── RENDER ─────────────────────────────────────────────────────────────────
function render(){
  const m=document.getElementById('main');
  if(!m) return;
  updateScheduleChip();
  const inst=renderInstallOffer();
  if(S.tab==='count')   m.innerHTML=inst+(S.historyMode ? renderHistory() : renderCount());
  if(S.tab==='order')   m.innerHTML=inst+(canAccessFeature('order')?renderOrder():renderFeatureGateBanner('order'));
  if(S.tab==='receive') m.innerHTML=inst+(canAccessFeature('receive')?renderReceive():renderFeatureGateBanner('receive'));
  if(S.tab==='usage')   m.innerHTML=inst+(canAccessFeature('usage')?renderUsage():renderFeatureGateBanner('usage'));
  if(S.tab==='setup')   m.innerHTML=inst+renderSetup();
  if(S.tab==='help')    m.innerHTML=inst+renderHelp();
  if(S.tab==='admin')   m.innerHTML=inst+renderAdmin();
  if(S.tab==='order') scheduleDrawBarcodes();
  syncUrlFromState();
}

function svgChevron(open){
  return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${open?'var(--ck-red)':'#9ca3af'}" stroke-width="2.5">${open?'<polyline points="6 9 12 15 18 9"/>':'<polyline points="9 18 15 12 9 6"/>'}</svg>`;
}

// ── COUNT TAB ────────────────────────────────────────────────────────────────
function toggleCountManualOrder(){
  S.countManualOrderOpen=!S.countManualOrderOpen;
  render();
}

function setCountView(mode){
  S.countView=mode;
  if(mode==='walk'){
    const flat=flattenWalkItems(getOrderedGroups(S.items));
    if(!flat.length){ S.countView='list'; render(); return; }
    S.walkIndex=Math.max(0,Math.min(S.walkIndex,flat.length-1));
  }
  render();
  if(mode==='walk') queueWalkFocus();
}

function enterWalkCount(clearDraft){
  if(clearDraft){ S.draft={}; S.walkIndex=0; clearOrderManualAdj(); S.countManualOrderOpen=false; }
  const flat=flattenWalkItems(getOrderedGroups(S.items));
  if(!flat.length){ alert('No items to count.'); return; }
  S.countView='walk';
  S.walkIndex=Math.max(0,Math.min(S.walkIndex,flat.length-1));
  render();
  queueWalkFocus();
}

/** Main count tab: unlock form and open walk-through from the first item */
function startNewCountSession(){
  S.historyMode=false;
  S.editSessionId=null;
  S.editDraft={};
  const flat=flattenWalkItems(getOrderedGroups(S.items));
  if(!flat.length){ alert('No items to count.'); return; }
  S.countFormActive=true;
  enterWalkCount(true);
}

function queueWalkFocus(){
  requestAnimationFrame(()=>{
    const q=document.getElementById('walk-qty');
    if(q){ q.focus(); q.select(); }
  });
}

function walkFlat(){ return flattenWalkItems(getOrderedGroups(S.items)); }

function walkGo(delta){
  const f=walkFlat();
  if(!f.length) return;
  S.walkIndex=Math.max(0,Math.min(f.length-1,S.walkIndex+delta));
  render();
  queueWalkFocus();
}

function walkPickL1(l1){
  const f=walkFlat();
  const i=f.findIndex(it=>(it.cat_l1||'Other')===l1);
  if(i>=0){ S.walkIndex=i; render(); queueWalkFocus(); }
}

function walkPickL2(l2){
  const f=walkFlat();
  const sels=document.querySelectorAll('.walk-selects select');
  const l1=sels[0]?sels[0].value:(f[S.walkIndex]?(f[S.walkIndex].cat_l1||'Other'):'Other');
  const i=f.findIndex(it=>(it.cat_l1||'Other')===l1&&(it.cat_l2||'General')===l2);
  if(i>=0){ S.walkIndex=i; render(); queueWalkFocus(); }
}

function walkQtyKey(ev){
  if(ev.key==='Enter'&&!ev.shiftKey){ ev.preventDefault(); walkGo(1); return; }
  if(ev.key==='Tab'){
    ev.preventDefault();
    if(ev.shiftKey) walkGo(-1);
    else walkGo(1);
  }
}

/** Tab / Shift+Tab between qty fields in category order; opens collapsed sections when needed */
function countListQtyKeydown(ev, itemId){
  if(S.countView!=='list'||!S.countFormActive) return;
  if(ev.key!=='Tab') return;
  const flat=flattenWalkItems(getOrderedGroups(S.items));
  const idx=flat.findIndex(i=>i.id===itemId);
  if(idx<0) return;
  const delta=ev.shiftKey?-1:1;
  const target=flat[idx+delta];
  if(!target) return;
  ev.preventDefault();
  const l1=target.cat_l1||'Other', l2=target.cat_l2||'General';
  const k1=EK1(l1), k2=EK2(l1,l2);
  const needRender=S.expanded[k1]!==true||S.expanded[k2]!==true;
  if(needRender){
    S.expanded[k1]=true;
    S.expanded[k2]=true;
    render();
    requestAnimationFrame(()=>{
      const el=document.getElementById('cq-'+target.id);
      if(el) el.focus();
    });
  }else{
    const el=document.getElementById('cq-'+target.id);
    if(el) el.focus();
  }
}

              <div style="display:flex;align-items:center">

  const groups = getOrderedGroups(S.items);

  <div class="banner banner-info" style="margin-bottom:8px">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>

  </div>`;
  groups.forEach(g=>{
    const l1=g.l1;
    const k1='edit/'+EK1(l1);

    h+=`<div class="l1-block">

      h+=`<div class="l1-inner">`;
      g.subs.forEach(s=>{
        const l2=s.l2;
        const k2='edit/'+EK2(l1,l2);
        const open2=S.expanded[k2]===true;
        const its=s.items;
        h+=`<div class="card" style="margin-bottom:6px">
          <button type="button" class="card-hdr" onclick="toggleCat(JSON.parse(decodeURIComponent('${encAttr(k2)}')))">
            <div class="cat-labels">${svgChevron(open2)}<span class="cat-l2">${escapeHtml(l2)}</span></div>
          </button>`;
        if(open2) its.forEach(item=>{
          const orig = sess.counts[item.id]!==undefined ? sess.counts[item.id] : '';
          const val = draft[item.id]!==undefined ? draft[item.id] : orig;
          const changed = draft[item.id]!==undefined && String(draft[item.id])!==String(orig);
          h+=`<div class="item-row">
            <div>
              <div class="item-name">${escapeHtml(item.name)}${changed?'<span style="color:var(--ck-red);font-size:10px;margin-left:4px">●</span>':''}</div>
              <div class="item-meta">Par: ${item.par} ${escapeHtml(item.unit)}</div>

              <span class="ulbl">${escapeHtml(item.unit)}</span>
            </div>
          </div>`;
        });
        h+='</div>';
      });

    }

      <button class="btn btn-danger btn-sm" onclick="deleteSession('${sessionId}')">Delete</button>
      <button class="btn btn-secondary btn-sm" onclick="cancelEditSession()">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="saveEditSession('${sessionId}')">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        Save Edits
      </button>
    </div>
    ${stickyFooterCopyright()}
  </div>`;
  return h;
}

// ── ORDER TAB ────────────────────────────────────────────────────────────────
function renderOrder(){
  const gate=renderFeatureGateBanner('order');
  if(gate){
    return `
    <div class="pg-hdr">
      <div><div class="pg-title">Recommended Order</div><div class="pg-sub">Subscription required</div></div>
    </div>
    ${gate}`;
  }
  const deadline = getOrderDeadline();
  const ms = deadline - new Date();
  const hrs = ms/3600000;

  let h=`
  <div class="pg-hdr">
    <div><div class="pg-title">Recommended Order</div><div class="pg-sub">Order by Thu 2pm · Arrives Mon 7am</div></div>
  </div>
  <div class="countdown-bar">
    <div class="countdown-inner">
      <div>
        <div class="countdown-label">Order deadline</div>
        <div class="countdown-value" style="color:${hrs<6?'#991b1b':hrs<24?'#92400e':'#166534'}">${fmtCountdown(ms)}</div>
      </div>
      <div class="countdown-divider"></div>
      <div style="text-align:right">
        <div class="countdown-label">Truck arrives</div>
        <div class="countdown-value" style="color:#1e40af">${fmtCountdown(getTruckArrival()-new Date())}</div>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:6px">
      <span style="font-size:11px;color:#9ca3af">Thu, ${deadline.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}</span>
      <span style="font-size:11px;color:#9ca3af">Mon, ${getTruckArrival().toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}</span>
    </div>
  </div>`;

  if(!S.sessions.length) return h+`<div class="empty">Take an inventory count first to generate an order.</div>`;
  const last = S.sessions[0];
  const rawRecommended = computeOrder();
  const pendingAll=S.orders.filter(o=>o.status==='pending');
  const pendingForLatest=pendingOrderForLatestCount();
  const otherPending=pendingAll.filter(o=>o!==pendingForLatest);
  const ex=getOrderRecExcludedSet();
  const orderItems=pendingForLatest?rawRecommended:rawRecommended.filter(it=>!ex.has(it.id));
  const removedFromOrder=pendingForLatest?[]:rawRecommended.filter(it=>ex.has(it.id));

  h+=`<div class="banner banner-info" style="margin-bottom:7px">Based on count from ${fmtDate(last.counted_at)}</div>`;

  if(pendingForLatest){
