function drawBarcodes(){
  if(S.tab!=='order') return;
  const QCtor=typeof globalThis!=='undefined'?globalThis.QRCode:null;
  const BCTor=typeof globalThis!=='undefined'?globalThis.JsBarcode:null;
  const mode=normalizeBarcodeMode(S.barcodeMode);
  const orderItems=orderTabLineItems();
  for(const item of orderItems){
    const wrap=document.getElementById('bc-'+item.id);
    const code=itemScanCode(item);
    if(!wrap||!code) continue;
    wrap.innerHTML='';
    if(mode==='barcode'){
      if(!BCTor){
        wrap.innerHTML=`<span class="mono" style="font-size:12px;padding:4px 8px;background:#f3f4f6;border-radius:6px;display:inline-block">${escapeHtml(code)}</span>`;
        continue;
      }
      try{
        const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
        wrap.appendChild(svg);
        BCTor(svg, code, {
          format:'CODE128',
          width:1.6,
          height:42,
          margin:0,
          displayValue:false,
          lineColor:'#111111',
          background:'#ffffff'
        });
        const cap=document.createElement('div');
        cap.className='mono';
        cap.style.cssText='font-size:10px;text-align:center;margin-top:4px;color:#6b7280;word-break:break-all;line-height:1.2';
        cap.textContent=code;
        wrap.appendChild(cap);
      }catch(e){
        wrap.innerHTML=`<span class="mono" style="font-size:12px;padding:4px 8px;background:#f3f4f6;border-radius:6px;display:inline-block">${escapeHtml(code)}</span>`;
      }
      continue;
    }
    if(!QCtor){
      wrap.innerHTML=`<span class="mono" style="font-size:12px;padding:4px 8px;background:#f3f4f6;border-radius:6px;display:inline-block">${escapeHtml(code)}</span>`;
      continue;
    }
    try{
      const holder=document.createElement('div');
      holder.style.cssText='display:inline-block;line-height:0;max-width:100%';
      wrap.appendChild(holder);
      const qrText=mode==='qr8'
        ? String.fromCharCode(...Array.from(new TextEncoder().encode(code)))
        : code;
      new QCtor(holder,{
        text:qrText,
        width:mode==='qr8'?64:72,
        height:mode==='qr8'?64:72,
        colorDark:'#111111',
        colorLight:'#ffffff',
        correctLevel:mode==='qr8'?QCtor.CorrectLevel.L:QCtor.CorrectLevel.M
      });
      const cap=document.createElement('div');
      cap.className='mono';
      cap.style.cssText='font-size:10px;text-align:center;margin-top:4px;color:#6b7280;word-break:break-all;line-height:1.2';
      cap.textContent=code;
      wrap.appendChild(cap);
    }catch(e){
      wrap.innerHTML=`<span class="mono" style="font-size:12px;padding:4px 8px;background:#f3f4f6;border-radius:6px;display:inline-block">${escapeHtml(code)}</span>`;
    }
  }
}

// ── RECEIVE TAB ──────────────────────────────────────────────────────────────
function renderReceive(){
  const gate=renderFeatureGateBanner('receive');
  if(gate){
    return `
    <div class="pg-hdr">
      <div><div class="pg-title">Receive Truck Order</div><div class="pg-sub">Subscription required</div></div>
    </div>
    ${gate}`;
  }
  const arrival = getTruckArrival();
  let h=`
  <div class="pg-hdr">
    <div><div class="pg-title">Receive Truck Order</div><div class="pg-sub">Log what actually arrived</div></div>
  </div>
  <div class="schedule-card">
    <div class="sched-item">
      <div class="sched-label">Truck arrives</div>
      <div class="sched-value">Monday</div>
      <div class="sched-time">7:00 AM</div>
    </div>
    <div style="width:1px;background:#f3f4f6"></div>
    <div class="sched-item">
      <div class="sched-label">Next arrival</div>
      <div class="sched-value">${fmtCountdown(arrival-new Date())}</div>
      <div class="sched-time">${arrival.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
    </div>
  </div>`;

  const pending = S.orders.filter(o=>o.status==='pending');
  if(!pending.length) return h+`<div class="empty">No pending orders. Place an order from the Order tab first.</div>`;

  const order = pending[0];
  if(pending.length>1){
    h+=`<div class="banner banner-warn" style="margin-bottom:7px">${pending.length} pending orders on file. This screen shows the <strong>most recent</strong> (${fmtDateTime(order.ordered_at)}). Delete it below if it was logged by mistake, then the next one will appear here.</div>`;
  }
  const ordEntries=Object.entries(order.items||{});
  const origLines=ordEntries.filter(([,d])=>!d||!d.extraLine);
  const extraLines=ordEntries.filter(([,d])=>d&&d.extraLine);
  const lineCount=ordEntries.length;
  h+=`<div class="banner banner-info">Order placed ${fmtDate(order.ordered_at)} · <strong>${lineCount}</strong> line${lineCount!==1?'s':''} on this receipt${extraLines.length?` (${extraLines.length} extra${extraLines.length!==1?'s':''})`:''}</div>`;
  h+=`<div class="card">`;
  h+=`<div class="card-hdr-static"><span style="font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.07em">Item</span><span style="font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.07em">Received</span></div>`;

  origLines.forEach(([itemId,data])=>{
    const item = S.items.find(i=>i.id===itemId);
    if(!item) return;
    const recN=parseFloat(data&&data.recommended);
    const recDisp=Number.isFinite(recN)?recN:0;
    h+=`<div class="item-row">
      <div>
        <div class="item-name">${escapeHtml(item.name)}</div>
        <div class="item-meta">Ordered: <span style="color:var(--ck-red);font-weight:600">${recDisp}</span> ${escapeHtml(itemOrderUnitLabel(item))}</div>
      </div>
      <div style="display:flex;align-items:center">
        <input class="qinput" type="number" min="0" step="0.5" id="recv-${itemId}" placeholder="${recDisp}">
        <span class="ulbl">${escapeHtml(itemOrderUnitLabel(item))}</span>
      </div>
    </div>`;
  });
  h+='</div>';

  const existingIds=new Set(Object.keys(order.items||{}));
  const addable=S.items.filter(it=>!existingIds.has(it.id));
  const extraOpts=addable.map(it=>`<option value="${escapeHtml(it.id)}">${escapeHtml(it.name)}</option>`).join('');
  h+=`<div class="card" style="margin-top:8px">
    <div class="card-hdr-static"><span style="font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.07em">Extras (autoship / not on order)</span></div>
    <div style="padding:8px 10px;font-size:11px;color:#6b7280;line-height:1.45">Add lines for product that arrived but was not on your saved order. They are stored on this receipt so <strong>usage</strong> can include what you actually put away.</div>`;
  if(extraLines.length){
    extraLines.forEach(([itemId,data])=>{
      const item=S.items.find(i=>i.id===itemId);
      if(!item) return;
      h+=`<div class="item-row" style="background:#fafafa">
        <div>
          <div class="item-name">${escapeHtml(item.name)} <span class="badge info" style="font-size:9px">Extra</span></div>
          <div class="item-meta">Not on original order · ${escapeHtml(itemOrderUnitLabel(item))}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <input class="qinput" type="number" min="0" step="0.5" id="recv-${itemId}" placeholder="0">
          <span class="ulbl">${escapeHtml(itemOrderUnitLabel(item))}</span>
          <button type="button" class="btn btn-ghost btn-sm" style="padding:4px 8px" onclick="receiveRemoveExtraLine('${order.id}',JSON.parse(decodeURIComponent('${encAttr(itemId)}')))" title="Remove this line">Remove</button>
        </div>
      </div>`;
    });
  }
  if(addable.length){
    h+=`<div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:8px 10px 10px;border-top:1px solid #f4f4f5">
      <select id="recv-extra-item" class="finput" style="flex:1;min-width:160px;margin:0;font-size:12px" aria-label="Item to add as extra">
        <option value="">Choose item…</option>
        ${extraOpts}
      </select>
      <button type="button" class="btn btn-secondary btn-sm" onclick="receiveAddExtraLine('${order.id}')">Add to receipt</button>
    </div>`;
  }else if(!extraLines.length){
    h+=`<div style="padding:8px 10px 10px;font-size:11px;color:#9ca3af;border-top:1px solid #f4f4f5">Every catalog item is already listed on this receipt.</div>`;
  }else{
    h+=`<div style="padding:8px 10px 10px;font-size:11px;color:#9ca3af;border-top:1px solid #f4f4f5">No more items to add from your catalog.</div>`;
  }
  h+='</div>';

  h+=`<div class="sticky-footer">
    <div class="sticky-footer-row between" style="flex-wrap:wrap;gap:8px">
      <button type="button" class="btn btn-danger btn-sm" onclick="deletePendingOrderById('${order.id}')">Delete pending order</button>
      <button class="btn btn-primary" onclick="confirmReceive('${order.id}')">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        Confirm Receipt
      </button>
    </div>
    ${stickyFooterCopyright()}
  </div>`;
  return h;
}

function receiveAddExtraLine(orderId){
  const sel=document.getElementById('recv-extra-item');
  if(!sel||!sel.value){ alert('Choose an item to add.'); return; }
  const itemId=sel.value;
  const order=S.orders.find(o=>o.id===orderId);
  if(!order||!order.items) return;
  if(order.items[itemId]){ alert('That item is already on this receipt.'); return; }
  order.items[itemId]={recommended:0,received:null,extraLine:true};
  ls.set('orders',S.orders);
  render();
}

function receiveRemoveExtraLine(orderId,itemId){
  const order=S.orders.find(o=>o.id===orderId);
  if(!order||!order.items||!order.items[itemId]||!order.items[itemId].extraLine) return;
  delete order.items[itemId];
  ls.set('orders',S.orders);
  render();
}

// ── USAGE TAB ────────────────────────────────────────────────────────────────
function renderUsage(){
  const gate=renderFeatureGateBanner('usage');
  if(gate){
    return `
    <div class="pg-hdr">
      <div><div class="pg-title">Usage</div><div class="pg-sub">Subscription required</div></div>
    </div>
    ${gate}`;
  }
  const usage = computeUsage();
  const withData = Object.values(usage).filter(u=>u.avg!==null).sort((a,b)=>(b.avgWeekly||0)-(a.avgWeekly||0));
  const recvd = S.orders.filter(o=>o.status==='received');
  const weekRollup = buildUsageWeekRollup(usage);
  const maxWeekly = withData.length ? Math.max(...withData.map(u=>u.avgWeekly||0), 0.0001) : 1;

  let h=`
  <div class="pg-hdr">
    <div>
      <div class="pg-title">Usage</div>
      <div class="pg-sub">By calendar week (Mon–Sun) · avg / week = mean of weekly totals</div>
    </div>
  </div>
  <div class="metrics" style="grid-template-columns:repeat(2,1fr)">
    <div class="metric"><div class="metric-v">${S.sessions.length}</div><div class="metric-l">counts</div></div>
    <div class="metric"><div class="metric-v">${recvd.length}</div><div class="metric-l">delivery cycles</div></div>
    <div class="metric"><div class="metric-v">${withData.length}</div><div class="metric-l">items tracked</div></div>
    <div class="metric"><div class="metric-v">${weekRollup.length}</div><div class="metric-l">calendar weeks</div></div>
  </div>`;

  if(!withData.length){
    h+=`<div class="empty">
      Usage data unlocks after completing a full cycle:<br><br>
      <strong>Count → Place Order → Receive Truck → Count Again</strong>
    </div>`;
    return h;
  }

  if(weekRollup.length){
    h+=`<div class="card usage-week-card">
      <div class="card-hdr-static">
        <span style="font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.07em">Usage by week</span>
      </div>`;
    weekRollup.forEach(week=>{
      h+=`<div style="padding:10px;border-bottom:1px solid #f4f4f5">
        <div class="usage-week-hdr">${escapeHtml(week.label)}</div>
        <div class="usage-week-sub">${week.lines.length} item${week.lines.length!==1?'s':''} with usage this week</div>`;
      week.lines.forEach(row=>{
        h+=`<div class="usage-week-line">
          <span>${escapeHtml(row.name)}</span>
          <span class="usage-week-used">${row.used.toFixed(1)} <span style="color:#9ca3af;font-weight:500">${escapeHtml(row.unit)}</span></span>
        </div>`;
      });
      h+=`</div>`;
    });
    h+=`</div>`;
  }

  h+=`<div class="card">
    <div class="card-hdr-static">
      <span style="font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.07em">By item</span>
    </div>`;
  Object.values(usage).forEach(u=>{
    const aw = u.avgWeekly;
    const bar = aw!=null ? Math.min(100, Math.round(aw / maxWeekly * 100)) : 0;
    const parRatio = aw!=null && u.par ? aw / u.par : null;
    let parNote='';
    if(parRatio!==null){
      if(parRatio>0.9) parNote=`<span class="badge warn" style="font-size:10px">Par may be low</span>`;
      else if(parRatio<0.3) parNote=`<span class="badge" style="font-size:10px">Par may be high</span>`;
    }
    const chips = (u.weekKeys||[]).slice(-8).map(wk=>{
      const short = new Date(wk+'T12:00:00').toLocaleDateString('en-US',{month:'numeric',day:'numeric'});
      return `<span class="usage-chip">${short}: ${u.byWeek[wk].toFixed(1)}</span>`;
    }).join('');
    h+=`<div class="item-row" style="flex-direction:column;align-items:stretch;gap:4px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="item-name">${escapeHtml(u.name)}</div>
          <div class="item-meta">${escapeHtml(u.cat_l1)} › ${escapeHtml(u.cat_l2)} · ${u.usages.length} cycle${u.usages.length!==1?'s':''}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:8px">
          ${aw!=null?`
            <div style="font-size:18px;font-weight:700;font-family:'SF Mono',monospace;color:var(--ck-red);line-height:1">${aw.toFixed(1)}</div>
            <div class="ulbl">avg ${escapeHtml(u.unit)}/wk</div>
            <div class="usage-stat-sub">${u.weekKeys.length} active week${u.weekKeys.length!==1?'s':''} · ${u.avg.toFixed(1)} avg / cycle</div>
            <div style="margin-top:4px">${parNote}</div>
          `:`<div style="font-size:11px;color:#9ca3af">pending</div>`}
        </div>
      </div>
      ${aw!=null?`<div style="display:flex;align-items:center;gap:6px">
        <div class="usage-bar-wrap" style="flex:1"><div class="usage-bar-fill" style="width:${bar}%"></div></div>
        <span style="font-size:10px;color:#9ca3af;flex-shrink:0">Par: ${u.par}</span>
      </div>`:''}
      ${chips?`<div class="usage-chip-row">${chips}</div>`:''}
    </div>`;
  });
  h+='</div>';

  h+=`<div style="font-size:10px;color:#9ca3af;text-align:center;margin-top:6px;padding:0 8px;line-height:1.45">
    <strong>Avg / wk</strong> is the average of each week’s total for that item (multiple deliveries in the same week are summed).<br>
    <strong>Par hints</strong> compare avg / wk to par: low = over 90% of par per week; high = under 30%.
  </div>`;
  return h;
}

function canAccessFeature(feature){
  const access=S.featureAccess||{};
  if(feature==='count') return access.count!==false;
  if(feature==='order') return access.ordering!==false;
  if(feature==='receive') return access.receive!==false;
  if(feature==='usage') return access.usage!==false;
  return true;
}

function renderFeatureGateBanner(feature){
  if(canAccessFeature(feature)) return '';
  const source=String((S.featureAccess&&S.featureAccess.source)||'subscription');
  if(source==='trial_expired'){
    return `<div class="banner banner-warn" style="margin-bottom:8px;line-height:1.45">Your 45-day trial for Ordering and Usage has ended. Contact your admin to activate a paid plan or set this store to free.</div>`;
  }
  return `<div class="banner banner-warn" style="margin-bottom:8px;line-height:1.45">This feature is disabled by current subscription settings.</div>`;
}

function updateFeatureAccessFromSnapshot(snapshot){
  const base={count:true,ordering:true,receive:true,usage:true,source:'legacy'};
  S.billingCtx=snapshot||null;
  if(!snapshot||!Array.isArray(snapshot.subscriptions)){
    S.featureAccess=base;
    return;
  }
  const subs=snapshot.subscriptions.filter(s=>String(s.store_id||'').trim()===ACTIVE_STORE.id);
  if(!subs.length){
    S.featureAccess=base;
    return;
  }
  const now=Date.now();
  let allowOrdering=false;
  let source='subscription';
  for(const sub of subs){
    const status=String(sub.status||'').toLowerCase();
    const isFree=!!sub.is_free || status==='free';
    if(isFree){
      allowOrdering=true;
      source='free';
      break;
    }
    if(status==='active'){
      allowOrdering=true;
      source='active';
      break;
    }
    if(status==='trialing'){
      const endTs=Date.parse(sub.trial_ends_at||'');
      if(!Number.isNaN(endTs)&&endTs>=now){
        allowOrdering=true;
        source='trialing';
        break;
      }
      source='trial_expired';
    }
  }
  S.featureAccess={
    count:true,
    ordering:allowOrdering,
    receive:allowOrdering,
    usage:allowOrdering,
    source
  };
}

// ─── URL / history (hash routes: #/count, #/count/walk, #/order/walk, #/receive, …) ─
let __ckUrlBoot=true;
let __ckUrlApplying=false;

async function loadCkLogic(){
  if(window.__CK_LOGIC) return;
  window.__CK_LOGIC=await import('./lib/ck-logic.mjs');
}

function applyRouteFromHash(){
  if(__ckUrlApplying||!window.__CK_LOGIC) return;
  const CK=window.__CK_LOGIC;
  __ckUrlApplying=true;
  try{
    const {tab,sub}=CK.parseRouteHash(location.hash);
    const valid=['count','order','receive','usage','setup','help','admin'];
    S.tab=valid.includes(tab)?tab:'count';
    S.historyMode=S.tab==='count'&&sub==='history';
    if(S.tab==='count'){
      S.countView=(sub==='walk'&&!S.historyMode)?'walk':'list';
    }else{
      S.countView='list';
    }
    if(S.tab==='order') S.orderView=sub==='walk'?'walk':'list';
    else S.orderView='list';
    if(S.tab!=='count') S.historyMode=false;
    if(S.tab==='admin'&&!S.adminAuthed){
      S.tab='setup';
    }
    const want=CK.buildRouteHash(S.tab,{countView:S.countView,orderView:S.orderView,historyMode:S.historyMode});
    if(!location.hash||location.hash==='#'){
      history.replaceState(null,'',location.pathname+location.search+want);
    }
    __ckUrlBoot=false;
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
    const tb=document.getElementById('t-'+S.tab); if(tb) tb.classList.add('on');
    syncCountFormAvailability();
  }finally{
    __ckUrlApplying=false;
  }
}

function syncUrlFromState(){
  if(__ckUrlApplying||!window.__CK_LOGIC) return;
  const CK=window.__CK_LOGIC;
  const want=CK.buildRouteHash(S.tab,{countView:S.countView,orderView:S.orderView,historyMode:S.historyMode});
  if(location.hash===want) return;
  const full=location.pathname+location.search+want;
  if(__ckUrlBoot){
    history.replaceState(null,'',full);
    __ckUrlBoot=false;
  }else{
    history.pushState(null,'',full);
  }
}

async function logOrder(){
  if(isAppBusy()) return;
  if(pendingOrderForLatestCount()){
    showBanner('An order is already logged for this count. Delete it on the Order tab first, or confirm it on Receive.','warn');
    return;
  }
  const orderItems = recommendedOrderLines();
  if(!orderItems.length){
    showBanner('No lines left on this order — restore a removed item or nothing will be saved.','warn');
    return;
  }
  const ackFlags=getOrderAckFlags(orderItems);
  const allScanned=orderItems.every(it=>!!ackFlags[it.id]);
  if(!allScanned){
    if(!confirm('Not all recommended items have been marked scanned. Do you still wish to save the order?')) return;
  }
  const id = makeEntityId('ord');
  const orderedAt = new Date().toISOString();
  const sessionId = S.sessions[0]?.id;
  const items = {};
  orderItems.forEach(i=>{ items[i.id]={recommended:i.toOrder,received:null}; });
  const order = {id,ordered_at:orderedAt,session_id:sessionId,status:'pending',items};
  try{
    setSyncing(true,'Placing order…');
    await db.saveOrder(id,orderedAt,sessionId,items);
    S.orders.unshift(order);
    ls.set('orders',S.orders);
    setSyncOk();
    try{ ls.set('orderAck',null); }catch{}
    clearOrderManualAdj();
    clearOrderRecExcludedForSession(sessionId);
    showBanner('Order logged! Head to Receive when the truck arrives.','ok');
    setTab('receive');
  }catch(e){
    S.orders.unshift(order);
    ls.set('orders',S.orders);
    setSyncErr(e.message);
    render();
  }
}

async function confirmReceive(orderId){
  if(isAppBusy()) return;
  const order=S.orders.find(o=>o.id===orderId);
  if(!order) return;
  const CK=window.__CK_LOGIC;
  const receivedMap=CK.buildReceivedQuantitiesMap(order.items, id=>{
    const inp=document.getElementById('recv-'+id);
    return inp?inp.value:null;
  });
  let ok=false;
  try{
    setSyncing(true,'Confirming receipt…');
    await db.confirmReceipt(orderId,receivedMap,order.items);
    order.status='received';
    order.received_at=new Date().toISOString();
    Object.entries(receivedMap).forEach(([id,v])=>{ if(order.items[id]) order.items[id].received=v; });
    ls.set('orders',S.orders);
    setSyncOk();
    ok=true;
  }catch(e){
    setSyncErr(e.message);
  }
  if(ok){
    showBanner('Truck order received! Take your next count to track usage.','ok');
  }
  render();
}

  render();
  focusSetupCodeInput(id);
}

function setQuickEditItemCodeDraft(v){
  S.setupCodeDraft=String(v??'');
}

function quickEditItemCodeKeydown(ev,id){
  if(ev.key==='Escape'){
    ev.preventDefault();
    cancelQuickEditItemCode();
    return;
  }
  if(ev.key==='Enter'){
    ev.preventDefault();
    void commitQuickEditItemCode(id);
  }
}

function quickEditItemCodeBlur(ev,id){
  if(!S.setupCodeEditId||S.setupCodeEditId!==id) return;
  const next=ev&&ev.relatedTarget;
  if(next&&next.closest&&next.closest('.setup-code-actions')) return;
  void commitQuickEditItemCode(id);
}

function cancelQuickEditItemCode(){
  if(S.setupCodeSavingId) return;
  clearQuickEditItemCode();
  render();
}

async function commitQuickEditItemCode(id){
  if(S.setupCodeEditId!==id||S.setupCodeSavingId===id||isAppBusy()) return;
  const idx=S.items.findIndex(i=>i.id===id);
  if(idx<0){ clearQuickEditItemCode(); render(); return; }
  const item=S.items[idx];
  const nextCode=String(S.setupCodeDraft||'').trim();
  const currentCode=String(item.upc||'').trim();
  if(nextCode===currentCode){
    clearQuickEditItemCode();
    render();
    return;
  }
  const updated={...item,upc:nextCode};
  S.setupCodeSavingId=id;
  render();
  try{
    setSyncing(true,'Saving UPC…');
    await db.upsertItem(updated);
    S.items[idx]=updated;
    ls.set('items',S.items);
    setSyncOk();
    clearQuickEditItemCode();
    showBanner('UPC updated.','ok');
    render();
  }catch(e){
    S.setupCodeSavingId=null;
    setSyncErr(e.message);
    render();
    focusSetupCodeInput(id);
  }
}

function startAdd(){ clearQuickEditItemCode(); S.formView='add'; S.editItemId=null; S.formData={name:'',cat_l1:'',cat_l2:'',par:'',unit:'cs',order_unit:'cs',order_pack_qty:'1',reorder_trigger:'',upc:'',code:''}; render(); }
function startEdit(id){
  clearQuickEditItemCode();
  const item=S.items.find(i=>i.id===id); if(!item) return;
  S.formView='edit'; S.editItemId=id;
  const triggerRaw=parseFloat(item.reorder_trigger);
  const triggerDisplay=Number.isFinite(triggerRaw)?String(triggerRaw):'';
  S.formData={name:item.name,cat_l1:item.cat_l1,cat_l2:item.cat_l2,par:String(item.par),unit:item.unit,order_unit:itemOrderUnitLabel(item),order_pack_qty:String(itemOrderPackQty(item)),reorder_trigger:triggerDisplay,upc:item.upc||'',code:item.code};
  render();
}
function cancelForm(){ clearQuickEditItemCode(); S.formView=null; S.editItemId=null; S.formData=null; render(); }
function updateForm(f,v){ if(!S.formData) S.formData={}; S.formData[f]=v; }

async function saveItem(){
  if(isAppBusy()) return;
  const f=S.formData||{};
  if(!f.name||!f.cat_l1||!f.par){ alert('Name, Category Level 1, and Par Level are required.'); return; }
  const existing=S.formView==='edit'?S.items.find(i=>i.id===S.editItemId):null;
  const orderPackQtyRaw=parseFloat(f.order_pack_qty);
  const item={
    id: S.formView==='add'?makeEntityId('item'):S.editItemId,
    name:f.name, cat_l1:f.cat_l1, cat_l2:f.cat_l2||'',
    par:parseFloat(f.par)||1,
    unit:f.unit||'cs',
    order_unit:String(f.order_unit||f.unit||'cs').trim()||String(f.unit||'cs').trim()||'cs',
    order_pack_qty:Number.isFinite(orderPackQtyRaw)&&orderPackQtyRaw>0?orderPackQtyRaw:1,
    reorder_trigger:String(f.reorder_trigger??'').trim()===''?null:(Number.isFinite(parseFloat(f.reorder_trigger))?parseFloat(f.reorder_trigger):null),
    upc:String(f.upc||'').trim(),
    code:f.code||'',
    sort_order: existing!=null&&Number.isFinite(parseFloat(existing.sort_order))?parseFloat(existing.sort_order):S.items.length+1
  };
  try{
    setSyncing(true,'Saving item…');
    await db.upsertItem(item);
    if(S.formView==='add') S.items.push(item);
    else { const idx=S.items.findIndex(i=>i.id===item.id); if(idx>=0) S.items[idx]=item; }
    ls.set('items',S.items);
    setSyncOk();
    S.formView=null; S.editItemId=null; S.formData=null;
    render();
  }catch(e){
    setSyncErr(e.message);
    render();
  }
}

async function deleteItem(id){
  if(!confirm('Delete this item? Historical count data for this item will also be removed.')) return;
  if(isAppBusy()) return;
  try{
    setSyncing(true,'Deleting item…');
    await db.deleteItem(id);
    S.items=S.items.filter(i=>i.id!==id);
    ls.set('items',S.items);
    setSyncOk();
    render();
  }catch(e){
    setSyncErr(e.message);
    render();
  }
}

// ─── PWA INSTALL (Android: beforeinstallprompt; iOS: manual Add to Home Screen only) ─
function isStandalonePWA(){
  try{
    if(window.matchMedia('(display-mode: standalone)').matches) return true;
    if(window.matchMedia('(display-mode: fullscreen)').matches) return true;
    if(window.matchMedia('(display-mode: minimal-ui)').matches) return true;
    if(typeof navigator.standalone==='boolean'&&navigator.standalone) return true;
  }catch{}
  return false;
}

function isLikelyIOS(){
  const ua=navigator.userAgent||'';
  if(/iPad|iPhone|iPod/.test(ua)) return true;
  if(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1) return true;
  return false;
}

function isLikelyAndroid(){
  return /Android/i.test(navigator.userAgent||'');
}

function installBannerDismissedThisSession(){
  try{ return sessionStorage.getItem('ck_install_banner_dismissed')==='1'; }catch{ return false; }
}

function dismissInstallOffer(){
  try{ sessionStorage.setItem('ck_install_banner_dismissed','1'); }catch{}
  render();
}

/** Prepended on every main tab so iPhone users see how to install (no native install banner on Safari). */
function renderInstallOffer(){
  if(isStandalonePWA()) return '';
  if(installBannerDismissedThisSession()) return '';
  if(S.installPrompt){
    return `<div class="install-banner install-banner--chrome" role="region" aria-label="Install app">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600">Install CK Inventory</div>
        <div style="font-size:11px;color:#6b7280;line-height:1.4;margin-top:2px">Add this app to your home screen for quick access and offline use.</div>
      </div>
      <div class="install-banner-actions">
        <button type="button" class="btn btn-secondary btn-sm" onclick="dismissInstallOffer()">Not now</button>
        <button type="button" class="btn btn-primary btn-sm" onclick="installPWA()">Install</button>
      </div>
    </div>`;
  }
  if(isLikelyIOS()){
    return `<div class="install-banner install-banner--ios" role="region" aria-label="Add to Home Screen">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600">Add to Home Screen (iPhone / iPad)</div>
        <div style="font-size:11px;color:#374151;line-height:1.45;margin-top:3px">Tap the <b>Share</b> button <span aria-hidden="true">(square with arrow up)</span>, scroll the menu, then tap <b>Add to Home Screen</b> → Add. For the most reliable install, open this page in <b>Safari</b>. Apple does not offer an automatic install banner like Chrome on Android.</div>
      </div>
      <div class="install-banner-actions">
        <button type="button" class="btn btn-secondary btn-sm" onclick="dismissInstallOffer()">Dismiss</button>
      </div>
    </div>`;
  }
  if(isLikelyAndroid()){
    return `<div class="install-banner install-banner--android" role="region" aria-label="Install app on Android">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600">Install on this Android device</div>
        <div style="font-size:11px;color:#374151;line-height:1.45;margin-top:3px">If no <b>Install</b> button appears above, open your browser’s <b>⋮</b> menu and choose <b>Install app</b>, <b>Add to Home screen</b>, or similar. Chrome may show its own install offer after you use the app briefly.</div>
      </div>
      <div class="install-banner-actions">
        <button type="button" class="btn btn-secondary btn-sm" onclick="dismissInstallOffer()">Dismiss</button>
      </div>
    </div>`;
  }
  return '';
}

async function installPWA(){
  const ev=S.installPrompt;
  if(!ev) return;
  try{
    await ev.prompt();
    const choice=await ev.userChoice;
    if(choice&&choice.outcome==='accepted') showBanner('App installed — look for CK on your home screen.','ok');
  }catch(e){
    showBanner('Install was cancelled or is not available in this browser.','warn');
  }
  S.installPrompt=null;
  render();
}

// ─── TESTS ───────────────────────────────────────────────────────────────────
async function runTests(){
  if(isAppBusy()) return;
  setProgressOnly(true,'Running tests…');
  const results=[];
  try{

  // Test 1: Supabase client initialized
  results.push({name:'Supabase client init',pass:!!sb,msg:sb?'':'createClient failed'});

  // Test 2: DB connection
  let connected=false;
  try{ connected = await db.checkTables(); } catch(e){ }
  results.push({name:'Database tables exist',pass:connected,msg:connected?'':'Run setup.sql in Supabase SQL Editor'});

  // Test 3: Items loaded
  results.push({name:'Items data loaded',pass:S.items.length>0,msg:S.items.length+' items'});

  // Test 4: Write test (insert + delete a test session)
  if(connected){
    try{
      const testId=makeEntityId('test');
      await sb.from('ck_sessions').insert(attachStoreScope({id:testId,counted_at:new Date().toISOString()}));
      let tq=sb.from('ck_sessions').delete().eq('id',testId);
      tq=scopeByStore(tq);
      await tq;
      results.push({name:'Write/delete cycle',pass:true,msg:'Insert + delete OK'});
    }catch(e){ results.push({name:'Write/delete cycle',pass:false,msg:e.message}); }
  } else {
    results.push({name:'Write/delete cycle',pass:false,skip:true,msg:'Skipped (no DB)'});
  }

  // Test 5: Schedule logic
  const dl=getOrderDeadline(), ta=getTruckArrival();
  const dlOk=dl>new Date()&&dl.getDay()===4;
  const taOk=ta>new Date()&&ta.getDay()===1;
  results.push({name:'Deadline is next Thursday 2pm',pass:dlOk,msg:dlOk?fmtDateTime(dl):'logic error'});
  results.push({name:'Truck arrival is next Monday 7am',pass:taOk,msg:taOk?fmtDateTime(ta):'logic error'});

  // Test 6: Usage computation
  const usageOk=typeof computeUsage()==='object';
  results.push({name:'Usage computation',pass:usageOk});

  // Test 7: Order computation
  const orderOk=Array.isArray(computeOrder());
  results.push({name:'Order computation',pass:orderOk});

  // Test 8: LocalStorage fallback
  let lsOk=false;
  try{ ls.set('_test','ok'); lsOk=ls.get('_test')==='ok'; ls.set('_test',null); }catch{}
  results.push({name:'LocalStorage fallback',pass:lsOk});

  // Test 9–11: Recommended order “Scanned” ack (sig + localStorage)
  const sigOk=orderRecSig([{id:'i1',toOrder:5},{id:'i2',toOrder:1}])==='i1:5,i2:1';
  results.push({name:'Order ack recommendation signature',pass:sigOk,msg:sigOk?'':'sig mismatch'});
  let prevOrderAck=null;
  try{ prevOrderAck=ls.get('orderAck'); }catch{}
  try{
    ls.set('orderAck',{sig:'__stale_test_bad__',flags:{x:true}});
    const emptyWhenSigMismatch=Object.keys(getOrderAckFlags([{id:'z',toOrder:1}])).length===0;
    results.push({name:'Order ack ignores wrong stored sig',pass:emptyWhenSigMismatch});
    const demoRows=[{id:'oa_t_a',toOrder:2},{id:'oa_t_b',toOrder:3}];
    const demoSig=orderRecSig(demoRows);
    ls.set('orderAck',{sig:demoSig,flags:{oa_t_a:true}});
    const f=getOrderAckFlags(demoRows);
    const readOk=!!f.oa_t_a&&!f.oa_t_b;
    results.push({name:'Order ack reads flags for current sig',pass:readOk,msg:readOk?'':JSON.stringify(f)});
  }finally{
    try{ ls.set('orderAck',prevOrderAck); }catch{}
  }

  S.testResults=results;
  render();
  }finally{
    setProgressOnly(false);
  }
}

async function reloadData(){
  if(isAppBusy()) return;
  const ov=document.getElementById('loading-overlay');

  ov.style.display='flex';
  lm.textContent='Refreshing data…';

  }finally{

// ─── BANNER HELPER ───────────────────────────────────────────────────────────
function showBanner(msg,type){
  const m=document.getElementById('main');
  if(!m) return;
  const div=document.createElement('div');
  div.className='banner banner-'+(type==='ok'?'ok':'err');
  div.innerHTML=`<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> ${msg}`;
  m.prepend(div);
  setTimeout(()=>div.remove(),3000);
}

function normalizeItemOrderFields(item){
  const next={...item};
  const fallbackUnit=String(next.unit||'').trim()||'cs';
  const orderUnitRaw=String(next.order_unit||'').trim();
  next.order_unit=orderUnitRaw||fallbackUnit;
  const packRaw=parseFloat(next.order_pack_qty);
  next.order_pack_qty=Number.isFinite(packRaw)&&packRaw>0?packRaw:1;
  const trigRaw=String(next.reorder_trigger??'').trim();
  if(trigRaw==='') next.reorder_trigger=null;
  else{
    const trigN=parseFloat(trigRaw);
    next.reorder_trigger=Number.isFinite(trigN)?trigN:null;
  }
  return next;
}

function normalizeItemsForOrderMath(items){
  return (items||[]).map(normalizeItemOrderFields);
}

// ─── DATA LOAD ───────────────────────────────────────────────────────────────
/** Once any inventory session exists, keep the count form unlocked (no start modal). */
function syncCountFormAvailability(){
  if(S.sessions&&S.sessions.length>0) S.countFormActive=true;
  else S.countFormActive=false;
}

async function loadFromDB(){
  if(!sb){ loadFromCache(); return; }
  try{
    const ok = await db.checkTables();
    if(!ok){
      S.dbReady=false;
      loadFromCache();
      setSyncErr('Tables not found — run setup.sql in Supabase');
      return;
    }
    S.dbReady=true;
    const {items,sessions,orders} = await db.loadAll();
    if(!items.length){
      const seeded=await db.seedItems();
      S.items = normalizeItemsForOrderMath(seeded);
    } else {
      S.items = normalizeItemsForOrderMath(items);
    }
    S.sessions = sessions;
    S.orders = orders;
    ls.set('items',S.items);
    ls.set('sessions',S.sessions);
    ls.set('orders',S.orders);
    if(S.dbSupportsBilling){
      try{
        const billingSnap=await db.adminLoadSnapshot();
        S.billingCtx=billingSnap;
        updateFeatureAccessFromSnapshot(billingSnap);
      }catch{
        updateFeatureAccessFromSnapshot(null);
      }
    }else{
      updateFeatureAccessFromSnapshot(null);
    }
    await mergeLayoutFromRemote();
    setSyncOk();
    syncCountFormAvailability();
  }catch(e){
    setSyncErr(e.message);
    loadFromCache();
  }
}

function loadFromCache(){
  const items = ls.get('items');
  S.items = normalizeItemsForOrderMath(items||scopedSeedItems());
  S.sessions = ls.get('sessions')||[];
  S.orders = ls.get('orders')||[];
  updateFeatureAccessFromSnapshot(null);
  syncCountFormAvailability();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function finishBoot(){
  await loadFromDB();
  applyRouteFromHash();
  document.getElementById('loading-overlay').style.display='none';
  render();
  if(!window.__ckVisStaleBound){
    window.__ckVisStaleBound=true;
    document.addEventListener('visibilitychange',()=>{
      if(document.visibilityState==='hidden') flushLayoutPushIfPending();
    });
  }
}

async function init(){
  restoreActiveStoreContext();
  await loadCkLogic();
  loadBarcodeModeSetting();
  try{ S.adminAuthed=sessionStorage.getItem(SS_ADMIN_KEY)==='1'; }catch{ S.adminAuthed=false; }

  window.addEventListener('popstate',()=>{
    applyRouteFromHash();
    render();
  });

  setInterval(updateScheduleChip, 30000);

  window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault();
    S.installPrompt=e;
    render();
  });

  window.addEventListener('appinstalled',()=>{
    S.installPrompt=null;
    try{ sessionStorage.setItem('ck_install_banner_dismissed','1'); }catch{}
    showBanner('App installed successfully.','ok');
    render();
  });

  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }

  if(!isStoreAuthed()){
    document.getElementById('loading-overlay').style.display='none';
    document.getElementById('pin-overlay').style.display='flex';
    const pi=document.getElementById('pin-input');
    const er=document.getElementById('pin-err');
    if(er) er.textContent='';
    if(pi) pi.value='';
    focusStorePinInput();
    return;
  }
  await finishBoot();
}

init();
