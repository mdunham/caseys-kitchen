  return window.__CK_LOGIC.computeOrderLines(S.items, last.counts||{}, getOrderManualAdj(), sortIds);
}

/** Session-scoped “do not include on this recommended order” (until logged or cleared). */
const LS_ORDER_REC_EXCLUDED='orderRecExcluded';

function pruneOrderRecExcludedMap(){
  if(!S.sessions||!S.sessions.length) return;
  const m=ls.get(LS_ORDER_REC_EXCLUDED);
  if(!m||typeof m!=='object') return;
  const valid=new Set(S.sessions.map(s=>s.id));
  let changed=false;
  const next={...m};
  for(const k of Object.keys(next)){
    if(!valid.has(k)){ delete next[k]; changed=true; }
  }
  if(changed) ls.set(LS_ORDER_REC_EXCLUDED,next);
}

function getOrderRecExcludedSet(){
  pruneOrderRecExcludedMap();
  const sid=S.sessions[0]?.id;
  if(!sid) return new Set();
  const m=ls.get(LS_ORDER_REC_EXCLUDED)||{};
  const arr=m[sid];
  return new Set(Array.isArray(arr)?arr:[]);
}

/** Recommended lines for the Order tab and “Log order” — same as computeOrder minus user-removed lines. */
function recommendedOrderLines(){
  const ex=getOrderRecExcludedSet();
  return computeOrder().filter(it=>!ex.has(it.id));
}

/** Lines shown on Order (walk/list/QR/acks): full reco while a pending order exists for reference; otherwise respects removals. */
function orderTabLineItems(){
  if(pendingOrderForLatestCount()) return computeOrder();
  return recommendedOrderLines();
}

function persistOrderRecExcludedSet(exSet){
  const sid=S.sessions[0]?.id;
  if(!sid) return;
  const m={...(ls.get(LS_ORDER_REC_EXCLUDED)||{})};
  if(exSet.size) m[sid]=[...exSet];
  else delete m[sid];
  ls.set(LS_ORDER_REC_EXCLUDED,m);
}

function excludeRecommendedLine(itemId){
  if(!S.sessions.length||pendingOrderForLatestCount()) return;
  const raw=computeOrder();
  if(!raw.some(i=>i.id===itemId)) return;
  const ex=getOrderRecExcludedSet();
  ex.add(itemId);
  persistOrderRecExcludedSet(ex);
  const n=recommendedOrderLines().length;
  if(S.orderView==='walk'){
    if(!n){ S.orderView='list'; S.orderWalkIndex=0; }
    else S.orderWalkIndex=Math.max(0,Math.min(S.orderWalkIndex,n-1));
  }
  render();
}

function restoreRecommendedLine(itemId){
  if(!S.sessions.length) return;
  const ex=getOrderRecExcludedSet();
  if(!ex.has(itemId)) return;
  ex.delete(itemId);
  persistOrderRecExcludedSet(ex);
  render();
}

function clearOrderRecExcludedForSession(sessionId){
  if(!sessionId) return;
  const m={...(ls.get(LS_ORDER_REC_EXCLUDED)||{})};
  if(!m[sessionId]) return;
  delete m[sessionId];
  ls.set(LS_ORDER_REC_EXCLUDED,m);
}

function normalizeOrderReceiptData(order){
  if(!order||typeof order!=='object') return;
  if(!order.items||typeof order.items!=='object') order.items={};
  const rawNotes=order.order_notes;
  order.order_notes=rawNotes==null?'':String(rawNotes);
  const rawMap=order.confirmed_map;
  const normalizedMap={};
  if(rawMap&&typeof rawMap==='object'&&!Array.isArray(rawMap)){
    Object.entries(rawMap).forEach(([k,v])=>{
      if(v) normalizedMap[String(k)]=true;
    });
  }
  order.confirmed_map=normalizedMap;
}

function normalizeOrderReceiptMap(order){
  if(!order||typeof order!=='object') return {};
  normalizeOrderReceiptData(order);
  return order.confirmed_map;
}

function normalizeOrdersForReceiptData(orders){
  const arr=Array.isArray(orders)?orders:[];
  arr.forEach(normalizeOrderReceiptData);
  return arr;
}

function getReceiveConfirmFlags(order){
  return {...normalizeOrderReceiptMap(order)};
}

function toggleReceiveConfirm(orderId,itemId){
  const order=S.orders.find(o=>o.id===orderId&&o.status==='pending');
  if(!order||!itemId) return;
  if(!order.items||!Object.prototype.hasOwnProperty.call(order.items,itemId)) return;
  normalizeOrderReceiptData(order);
  const cur=getReceiveConfirmFlags(order);
  const next={...cur};
  if(next[itemId]) delete next[itemId];
  else next[itemId]=true;
  order.confirmed_map=next;
  ls.set('orders',S.orders);
  render();
}

// ─── ORDER TAB HELPERS (ack toggles + list/walk) ─────────────────────────────
function orderRecSig(items){
  return items.map(i=>i.id+':'+i.toOrder).join(',');
}

function getOrderAckFlags(items){
  const sig=orderRecSig(items);
  const st=ls.get('orderAck');
  if(!st||st.sig!==sig||typeof st.flags!=='object') return {};
  return {...st.flags};
}

function setOrderListHideScanned(v){
  S.orderListHideScanned=!!v;
  render();
}

function toggleOrderAck(itemId){
  const items=orderTabLineItems();
  if(!items.some(i=>i.id===itemId)) return;
  const sig=orderRecSig(items);
  const cur=getOrderAckFlags(items);
  const wasAcked=!!cur[itemId];
  const next={...cur};
  if(next[itemId]) delete next[itemId];
  else next[itemId]=true;
  ls.set('orderAck',{sig,flags:next});
  const markedScanned=!wasAcked&&!!next[itemId];
  if(markedScanned&&S.tab==='order'&&S.orderView==='walk'){
    const i=items.findIndex(x=>x.id===itemId);
    if(i===S.orderWalkIndex&&i<items.length-1) S.orderWalkIndex=i+1;
  }
  render();
}

function setOrderView(mode){
  S.orderView=mode;
  const oi=orderTabLineItems();
  if(mode==='walk'){
    if(!oi.length){ S.orderView='list'; render(); return; }
    S.orderWalkIndex=Math.max(0,Math.min(S.orderWalkIndex,oi.length-1));
  }
  render();
  if(mode==='walk') scheduleDrawBarcodes();
}

function orderWalkGo(delta){
  const oi=orderTabLineItems();
  if(!oi.length) return;
  S.orderWalkIndex=Math.max(0,Math.min(oi.length-1,S.orderWalkIndex+delta));
  render();
  scheduleDrawBarcodes();
}

function orderWalkPick(ix){
  const oi=orderTabLineItems();
  const n=parseInt(ix,10);
  if(!Number.isFinite(n)||n<0||n>=oi.length) return;
  S.orderWalkIndex=n;
  render();
  scheduleDrawBarcodes();
}

/** Pending order row tied to the most recent inventory count */
function pendingOrderForLatestCount(){
  if(!S.sessions.length) return null;
  const sid=S.sessions[0].id;
  return S.orders.find(o=>o.status==='pending'&&o.session_id===sid)||null;
}

/** Remove a pending (not yet received) order by id — used from Order and Receive tabs */
async function deletePendingOrderById(orderId, confirmMessage){
  const ord=S.orders.find(o=>o.id===orderId&&o.status==='pending');
  if(!ord) return;
  const msg=confirmMessage||'Delete this pending order? You can place a new one from the Order tab when ready.';
  if(!confirm(msg)) return;
  if(isAppBusy()) return;
  try{
    setSyncing(true,'Removing order…');
    await db.deleteOrder(orderId);
    S.orders=S.orders.filter(o=>o.id!==orderId);
    ls.set('orders',S.orders);
    setSyncOk();
    try{ ls.set('orderAck',null); }catch{}
    showBanner('Pending order removed.','ok');
    render();
  }catch(e){
    setSyncErr(e.message);
    render();
  }
}

async function deletePendingOrderForLatest(){
  const po=pendingOrderForLatestCount();
  if(!po) return;
  await deletePendingOrderById(po.id,'Delete this pending order? You can log a new order from the same count afterward.');
}

/*
  UI architecture (single index.html): all screens are string-built HTML assigned to #main.innerHTML
  on each render(). That pattern is simple but re-parses the whole main column on every state change,
  which is the main source of “lag” on slower phones. Mitigations in this file: debounced barcode
  generation (small QR codes via qrcodejs), guarding heavy work to the active tab, and keeping renders purposeful (no extra polls).
  Data sync: db.loadAll() pulls only the newest LOAD_CAP_SESSIONS sessions and LOAD_CAP_ORDERS orders (see lib/ck-logic.mjs),
  with counts/order_items restricted to those ids — so months or years of history do not blow RAM or the ~5MB localStorage mirror.
  Larger wins later: incremental DOM updates, a small component layer, or virtualizing long Setup lists.
*/
let __drawBcTimer=null;
function scheduleDrawBarcodes(){
  if(__drawBcTimer) clearTimeout(__drawBcTimer);
  if(S.tab!=='order') return;
  __drawBcTimer=setTimeout(()=>{
    __drawBcTimer=null;
    requestAnimationFrame(()=>{

}

function walkPickL2(l2){

function walkQtyKey(ev){

  if(ev.key==='Tab'){

    if(ev.shiftKey) walkGo(-1);
    else walkGo(1);
  }
}

function initialParFlat(){

function initialSetupDraftEntry(item,rawDraft){
  const rawPar=item&&item.par!=null?String(item.par):'';
  const parFallback=rawPar.trim();
  const triggerRaw=item&&item.reorder_trigger!=null?String(item.reorder_trigger):'';
  const triggerFallback=triggerRaw.trim();
  if(rawDraft&&typeof rawDraft==='object'&&!Array.isArray(rawDraft)){
    const parVal=rawDraft.par!=null?String(rawDraft.par):'';
    const trigVal=rawDraft.trigger!=null?String(rawDraft.trigger):(rawDraft.reorder_trigger!=null?String(rawDraft.reorder_trigger):'');
    return {par:parVal.trim(),trigger:trigVal.trim()};
  }
  if(rawDraft!==undefined&&rawDraft!==null){
    return {par:String(rawDraft).trim(),trigger:triggerFallback};
  }
  return {par:parFallback,trigger:triggerFallback};
}

function needsInitialParSetup(status=S.itemsStatus, items=S.items){
  if(!S.dbSupportsStoreScope) return false;
  if(ACTIVE_STORE.id===TEMPLATE_STORE_ID) return false;
  if(!(items||[]).length) return false;
  if(S.sessions&&S.sessions.length>0) return false;
  const st=status&&typeof status==='object'?status:readInitialSetupStatus();
  if(st&&st.parSetupDone===true) return false;
  return true;
}

function startInitialParSetup(opts={}){
  const flat=initialParFlat();
  if(!flat.length){
    S.initialSetupActive=false;
    S.initialSetupIndex=0;
    S.initialSetupParDraft={};
    return;
  }
  const status=readInitialSetupStatus();
  const incomingDraft=opts&&opts.draft&&typeof opts.draft==='object'?opts.draft:{};
  const keepDraft=opts&&opts.keepDraft===true;
  const baseDraft=keepDraft?S.initialSetupParDraft:{};
  const mergedDraft={...baseDraft,...incomingDraft};
  flat.forEach(item=>{
    mergedDraft[item.id]=initialSetupDraftEntry(item,mergedDraft[item.id]);
  });
  S.initialSetupActive=true;
  S.initialSetupParDraft=mergedDraft;
  const rawIx=opts&&Number.isFinite(opts.startIndex)?opts.startIndex:0;
  S.initialSetupIndex=Math.max(0,Math.min(flat.length-1,rawIx));
  S.tab='count';
  S.historyMode=false;
  S.countView='walk';
}

function setInitialParDraft(itemId,val){
  const item=S.items.find(i=>i.id===itemId);
  const cur=initialSetupDraftEntry(item,S.initialSetupParDraft[itemId]);
  S.initialSetupParDraft[itemId]={...cur,par:String(val??'')};
}

function setInitialTriggerDraft(itemId,val){
  const item=S.items.find(i=>i.id===itemId);

function initialParQtyKey(ev,field='par'){
  if(field==='par'&&ev.key==='Enter'&&!ev.shiftKey){
    ev.preventDefault();
    focusInitialTriggerInput();
    return;
  }
  if(field==='trigger'&&ev.key==='Enter'&&!ev.shiftKey){
    ev.preventDefault();
    void saveInitialParAndMove(1);
    return;
  }
  if(field==='trigger'&&ev.key==='Tab'&&!ev.shiftKey){
    ev.preventDefault();
    void saveInitialParAndMove(1);
  }
}

async function saveInitialParAndMove(delta){
  if(!S.initialSetupActive||isAppBusy()) return;
  const flat=initialParFlat();
  if(!flat.length){
    skipInitialParSetup();
    return;
  }
  const idx=Math.max(0,Math.min(S.initialSetupIndex,flat.length-1));
  const item=flat[idx];
  const draftEntry=initialSetupDraftEntry(item,S.initialSetupParDraft[item.id]);
  const parsed=parseFloat(draftEntry.par);
  if(!Number.isFinite(parsed)||parsed<=0){
    alert('Enter a par greater than 0 before moving to the next item.');
    return;
  }
  const triggerRaw=String(draftEntry.trigger??'').trim();
  let triggerVal=null;
  if(triggerRaw!==''){
    const parsedTrigger=parseFloat(triggerRaw);
    if(!Number.isFinite(parsedTrigger)||parsedTrigger<0){
      alert('Minimum count order trigger must be 0 or greater, or leave it blank.');
      return;
    }
    triggerVal=Math.round(parsedTrigger*100)/100;
  }
  const rounded=Math.round(parsed*100)/100;
  S.initialSetupParDraft[item.id]={par:String(rounded),trigger:triggerVal==null?'':String(triggerVal)};
  const nextItems=[...S.items];
  const itemIx=nextItems.findIndex(i=>i.id===item.id);
  if(itemIx<0) return;
  nextItems[itemIx]={...nextItems[itemIx],par:rounded,reorder_trigger:triggerVal};
  S.items=normalizeItemsForOrderMath(nextItems);
  ls.set('items',S.items);
  queueInitialParSave(item.id);
  if(delta<0&&idx>0){
    S.initialSetupIndex=idx-1;
    render();
    queueInitialParFocus();
    return;
  }
  if(delta>0&&idx<flat.length-1){
    S.initialSetupIndex=idx+1;
    render();
    queueInitialParFocus();
    return;
  }
  try{
    await flushInitialParSaveQueue({waitForInFlight:true});
  }catch{
    return;
  }
  markInitialSetupComplete({item_count:flat.length,updated_count:flat.length});
  S.initialSetupActive=false;
  S.initialSetupIndex=0;
  S.initialSetupParDraft={};
  syncCountFormAvailability();
  setSyncOk();
  showBanner('Initial par setup saved. Start your first count.','ok');
  render();
}

function queueInitialParSave(itemId){
  const id=String(itemId||'').trim();
  if(!id) return;
  __initialParQueuedIds.add(id);
  if(__initialParSaveTimer) clearTimeout(__initialParSaveTimer);
  __initialParSaveTimer=setTimeout(()=>{
    __initialParSaveTimer=null;
    void flushInitialParSaveQueue();
  },INITIAL_PAR_SAVE_DEBOUNCE_MS);
}

async function flushInitialParSaveQueue(opts={}){
  const waitForInFlight=opts&&opts.waitForInFlight===true;
  if(__initialParSaveTimer){
    clearTimeout(__initialParSaveTimer);
    __initialParSaveTimer=null;
  }
  if(__initialParSaveInFlight){
    if(waitForInFlight){
      await __initialParSaveInFlight;
      if(__initialParQueuedIds.size) return flushInitialParSaveQueue(opts);
    }
    return;
  }
  if(!__initialParQueuedIds.size) return;
  const ids=[...__initialParQueuedIds];
  __initialParQueuedIds.clear();
  const idSet=new Set(ids);
  const rows=S.items.filter(item=>idSet.has(item.id));
  if(!rows.length) return;
  const savePromise=(async()=>{
    try{
      await db.upsertItems(rows);
      if(!S.syncing&&!S.progressOnly&&S.syncError){
        setSyncOk();
        render();
      }
    }catch(e){
      ids.forEach(id=>__initialParQueuedIds.add(id));
      setSyncErr(e&&e.message?e.message:'Unable to save par levels or triggers.');
      render();
      throw e;
    }finally{
      __initialParSaveInFlight=null;
      if(__initialParQueuedIds.size&&!waitForInFlight){
        __initialParSaveTimer=setTimeout(()=>{
          __initialParSaveTimer=null;
          void flushInitialParSaveQueue();
        },INITIAL_PAR_SAVE_DEBOUNCE_MS);
      }
    }
  })();
  __initialParSaveInFlight=savePromise;
  if(waitForInFlight){
    await savePromise;
    if(__initialParQueuedIds.size) await flushInitialParSaveQueue(opts);
  }
}

/** Tab / Shift+Tab between qty fields in category order; opens collapsed sections when needed */
function countListQtyKeydown(ev, itemId){
  if(S.countView!=='list'||!S.countFormActive) return;
  if(ev.key!=='Tab') return;
  const flat=flattenWalkItems(getOrderedGroups(S.items));
  const idx=flat.findIndex(i=>i.id===itemId);
  if(idx<0) return;
  const delta=ev.shiftKey?-1:1;
  const target=flat[idx+delta];
  if(!target) return;
  ev.preventDefault();
  const l1=target.cat_l1||'Other', l2=target.cat_l2||'General';
  const k1=EK1(l1), k2=EK2(l1,l2);
  const needRender=S.expanded[k1]!==true||S.expanded[k2]!==true;
  if(needRender){
    S.expanded[k1]=true;
    S.expanded[k2]=true;
    render();
    requestAnimationFrame(()=>{
      const el=document.getElementById('cq-'+target.id);
      if(el) el.focus();
    });
  }else{
    const el=document.getElementById('cq-'+target.id);
    if(el) el.focus();
  }
}

            <button type="button" class="btn-manual" aria-label="Decrease manual extra" onclick="bumpOrderManualAdj('${item.id}',-1)">−</button>

            <button type="button" class="btn-manual" aria-label="Increase manual extra" onclick="bumpOrderManualAdj('${item.id}',1)">+</button>
          </div>
          <div class="manual-order-hint">${basePrev===null?'Enter a count above to preview par-based qty. ':'Par-based from this line: <b>'+basePrev+'</b> '+escapeHtml(ordUnit)+' · '}${basePrev!==null?'<b>'+comb+'</b> would log after save (par-based + manual).':'Manual extra still applies when you save the count.'}</div>
        </div>`;
        })():''}
      </div>`;
    }
  }else{
    groups.forEach(g=>{
      const l1=g.l1;
      const k1=EK1(l1);
      const open1=S.expanded[k1]===true;
      let tot=0, done=0;
      g.subs.forEach(s=>{
        s.items.forEach(i=>{ tot++; if(draft[i.id]!==undefined&&draft[i.id]!=='') done++; });
      });
      h+=`<div class="l1-block">
        <button type="button" class="l1-hdr" onclick="toggleCat(JSON.parse(decodeURIComponent('${encAttr(k1)}')))">
          <div class="l1-title">${svgChevron(open1)}<span>${escapeHtml(l1)}</span></div>
          <span class="badge${done===tot&&tot?' done':''}">${done}/${tot}</span>
        </button>`;
      if(open1){
        h+=`<div class="l1-inner">`;
        g.subs.forEach(s=>{
          const l2=s.l2;
          const k2=EK2(l1,l2);
          const open2=S.expanded[k2]===true;
          const its=s.items;
          const cc=its.filter(i=>draft[i.id]!==undefined&&draft[i.id]!=='').length;
          h+=`<div class="card" style="margin-bottom:6px">
            <button type="button" class="card-hdr" onclick="toggleCat(JSON.parse(decodeURIComponent('${encAttr(k2)}')))">
              <div class="cat-labels">${svgChevron(open2)}<span class="cat-l2">${escapeHtml(l2)}</span></div>
              <span class="badge${cc===its.length?' done':''}">${cc}/${its.length}</span>
            </button>`;
          if(open2) its.forEach(item=>{
            const val=draft[item.id]!==undefined?draft[item.id]:'';
            h+=`<div class="item-row count-item-row">
              <div>
                <div class="item-name">${escapeHtml(item.name)}</div>
                <div class="item-meta">Par: <b style="color:var(--ck-red)">${item.par}</b> ${escapeHtml(item.unit)} · <span class="mono">${escapeHtml(itemScanMeta(item))}</span></div>
              </div>
              <div style="display:flex;align-items:center">
                <input class="qinput" type="number" min="0" step="0.5" id="cq-${item.id}" value="${val}" placeholder="0" oninput="setDraft('${item.id}',this.value)" onkeydown="countListQtyKeydown(event,'${item.id}')">
                <span class="ulbl">${escapeHtml(item.unit)}</span>
              </div>
            </div>
            ${!formLocked&&S.countManualOrderOpen?(()=>{
              const onH=countDraftOnHand(item.id);
              const basePrev=onH===null?null:parBasedToOrder(item,onH);
              const adjN=roundOrderAdj(parseFloat(getOrderManualAdj()[item.id])||0);
              const comb=basePrev===null?'':String(Math.max(0,roundOrderAdj(basePrev+adjN)));
              const ordUnit=itemOrderUnitLabel(item);
              return `<div class="manual-order-inline">
              <span class="manual-order-inline-lbl">Manual +order</span>
              <button type="button" class="btn-manual-sm" onclick="bumpOrderManualAdj('${item.id}',-1)">−</button>
              <span class="manual-order-val-sm">${fmtManualAdj(adjN)}</span>
              <button type="button" class="btn-manual-sm" onclick="bumpOrderManualAdj('${item.id}',1)">+</button>
              ${basePrev!==null?`<span class="manual-order-inline-prev">log ${comb} ${escapeHtml(ordUnit)}</span>`:''}
            </div>`;
            })():''}`;
          });
          h+='</div>';
        });
        h+=`</div>`;
      }
      h+='</div>';
    });
  }

  h+=`<div class="sticky-footer">
    <div class="sticky-footer-row between">
      <span style="font-size:12px;color:#9ca3af">${new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})}</span>
      <button class="btn btn-primary" onclick="completeInventory()" ${counted===0?'disabled':''}>
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        Save Count
      </button>
    </div>
    ${stickyFooterCopyright()}
  </div>
  </div>`;
  if(formLocked){
    h+=`<div class="count-form-lock" role="dialog" aria-modal="true" aria-labelledby="count-lock-title">
      <div class="count-form-lock-card">
        <div class="count-form-lock-title" id="count-lock-title">New inventory count</div>
        <div class="count-form-lock-sub">This screen only appears until your <b>first</b> inventory is saved. After that, the count form stays open here automatically. When you start, you can step through items or use <b>Full list</b>.</div>
        <button type="button" class="btn btn-primary" style="width:100%" onclick="startNewCountSession()">Start new count</button>
        <button type="button" class="btn btn-secondary" style="width:100%;margin-top:8px" onclick="goToCountHistory()">Previous counts</button>
      </div>
    </div>`;
  }
  if(showResumePrompt){
    const draftProgress=countDraftProgress();
    h+=`<div class="count-form-lock" role="dialog" aria-modal="true" aria-labelledby="count-resume-title">
      <div class="count-form-lock-card">
        <div class="count-form-lock-title" id="count-resume-title">A count is already in progress.</div>
        <div class="count-form-lock-sub">You have a saved draft with <b>${draftProgress.counted}/${draftProgress.total}</b> items counted. Continue where you left off or delete this draft and start over.</div>
        <button type="button" class="btn btn-primary" style="width:100%" onclick="continueCountDraftSession()">Continue where I left off</button>
        <button type="button" class="btn btn-secondary" style="width:100%;margin-top:8px" onclick="confirmDeleteCountDraftAndRestart()">Delete and start over</button>
      </div>
    </div>`;
  }
  h+='</div>';
  return h;
}

function renderHistory(){
  let h=`
  <div class="pg-hdr">
    <div><div class="pg-title">Count History</div><div class="pg-sub">${S.sessions.length} recorded session${S.sessions.length!==1?'s':''}</div></div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">
      <button class="btn btn-secondary btn-sm" onclick="historyBack()">Back</button>
      <button class="btn btn-primary btn-sm" onclick="startNewCountSession()">+ New Count</button>
    </div>
  </div>`;
  if(!S.sessions.length) return h+`<div class="empty">No count history yet. Take your first inventory to get started.</div>`;
  if(S.editSessionId){
    return h + renderEditSession(S.editSessionId);
  }
  h+='<div class="card">';
  S.sessions.forEach(sess=>{
    const ct=Object.values(sess.counts).filter(v=>v!==undefined).length;
    h+=`<div class="session-row" onclick="startEditSession('${sess.id}')">
      <div>
        <div style="font-size:13px;font-weight:600">${fmtDate(sess.counted_at)}</div>
        <div class="item-meta">${ct} items counted · ${fmtTime(sess.counted_at)}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="badge info">${ct}</span>
        <svg width="14" height="14" fill="none" stroke="#9ca3af" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>`;
  });
  h+='</div>';
  return h;
}

function renderEditSession(sessionId){
  const sess = S.sessions.find(s=>s.id===sessionId);
  if(!sess) return '<div class="empty">Session not found.</div>';
  const draft = S.editDraft;
  const groups = getOrderedGroups(S.items);
  let h=`
  <div class="banner banner-info" style="margin-bottom:8px">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    Editing: ${fmtDateTime(sess.counted_at)}
  </div>`;
  groups.forEach(g=>{
    const l1=g.l1;
    const k1='edit/'+EK1(l1);
    const open1=S.expanded[k1]===true;
    h+=`<div class="l1-block">
      <button type="button" class="l1-hdr" onclick="toggleCat(JSON.parse(decodeURIComponent('${encAttr(k1)}')))">
        <div class="l1-title">${svgChevron(open1)}<span>${escapeHtml(l1)}</span></div>
      </button>`;
    if(open1){
      h+=`<div class="l1-inner">`;
      g.subs.forEach(s=>{
        const l2=s.l2;
        const k2='edit/'+EK2(l1,l2);
        const open2=S.expanded[k2]===true;
        const its=s.items;
        h+=`<div class="card" style="margin-bottom:6px">
          <button type="button" class="card-hdr" onclick="toggleCat(JSON.parse(decodeURIComponent('${encAttr(k2)}')))">
            <div class="cat-labels">${svgChevron(open2)}<span class="cat-l2">${escapeHtml(l2)}</span></div>
          </button>`;
        if(open2) its.forEach(item=>{
          const orig = sess.counts[item.id]!==undefined ? sess.counts[item.id] : '';
          const val = draft[item.id]!==undefined ? draft[item.id] : orig;
          const changed = draft[item.id]!==undefined && String(draft[item.id])!==String(orig);
          h+=`<div class="item-row">
            <div>
              <div class="item-name">${escapeHtml(item.name)}${changed?'<span style="color:var(--ck-red);font-size:10px;margin-left:4px">●</span>':''}</div>
              <div class="item-meta">Par: ${item.par} ${escapeHtml(item.unit)}</div>
            </div>
            <div style="display:flex;align-items:center">
              <input class="qinput" type="number" min="0" step="0.5" value="${val}" placeholder="0" oninput="setEditDraft('${item.id}',this.value)">
              <span class="ulbl">${escapeHtml(item.unit)}</span>
            </div>
          </div>`;
        });
        h+='</div>';
      });
      h+=`</div>`;
    }
    h+='</div>';
  });
  h+=`<div class="sticky-footer">
    <div class="sticky-footer-row">
      <button class="btn btn-danger btn-sm" onclick="deleteSession('${sessionId}')">Delete</button>
      <button class="btn btn-secondary btn-sm" onclick="cancelEditSession()">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="saveEditSession('${sessionId}')">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        Save Edits
      </button>
    </div>
    ${stickyFooterCopyright()}
  </div>`;
  return h;
}

// ── ORDER TAB ────────────────────────────────────────────────────────────────
function renderOrder(){
  const gate=renderFeatureGateBanner('order');
  if(gate){
    return `
    <div class="pg-hdr">
      <div><div class="pg-title">Recommended Order</div><div class="pg-sub">Subscription required</div></div>
    </div>
    ${gate}`;
  }
  const deadline = getOrderDeadline();
  const ms = deadline - new Date();
  const hrs = ms/3600000;

  let h=`
  <div class="pg-hdr">
    <div><div class="pg-title">Recommended Order</div><div class="pg-sub">Order by Thu 2pm · Arrives Mon 7am</div></div>
  </div>
  <div class="countdown-bar">
    <div class="countdown-inner">
      <div>
        <div class="countdown-label">Order deadline</div>
        <div class="countdown-value" style="color:${hrs<6?'#991b1b':hrs<24?'#92400e':'#166534'}">${fmtCountdown(ms)}</div>
      </div>
      <div class="countdown-divider"></div>
      <div style="text-align:right">
        <div class="countdown-label">Truck arrives</div>
        <div class="countdown-value" style="color:#1e40af">${fmtCountdown(getTruckArrival()-new Date())}</div>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:6px">
      <span style="font-size:11px;color:#9ca3af">Thu, ${deadline.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}</span>
      <span style="font-size:11px;color:#9ca3af">Mon, ${getTruckArrival().toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}</span>
    </div>
  </div>`;

  if(!S.sessions.length) return h+`<div class="empty">Take an inventory count first to generate an order.</div>`;
  const last = S.sessions[0];
  const rawRecommended = computeOrder();
  const pendingAll=S.orders.filter(o=>o.status==='pending');
  const pendingForLatest=pendingOrderForLatestCount();
  const otherPending=pendingAll.filter(o=>o!==pendingForLatest);
  const ex=getOrderRecExcludedSet();
  const orderItems=pendingForLatest?rawRecommended:rawRecommended.filter(it=>!ex.has(it.id));
  const removedFromOrder=pendingForLatest?[]:rawRecommended.filter(it=>ex.has(it.id));

  h+=`<div class="banner banner-info" style="margin-bottom:7px">Based on count from ${fmtDate(last.counted_at)}</div>`;

  if(pendingForLatest){
    const lines=Object.keys(pendingForLatest.items||{});
    const nLines=lines.length;
    const sumLogged=Object.values(pendingForLatest.items||{}).reduce((s,d)=>s+(parseFloat(d.recommended)||0),0);
    h+=`<div class="banner banner-ok" style="margin-bottom:7px">
      <div style="margin-bottom:8px;line-height:1.45">An order is <strong>already saved</strong> for this count (${fmtDateTime(pendingForLatest.ordered_at)}): <strong>${nLines}</strong> line items, <strong>${sumLogged}</strong> total recommended units. Open <strong>Receive</strong> when you are ready to confirm the truck.</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        <button type="button" class="btn btn-secondary btn-sm" onclick="setTab('receive')">Open Receive</button>
        <button type="button" class="btn btn-danger btn-sm" onclick="deletePendingOrderForLatest()">Delete order and start over</button>
      </div>
    </div>`;
  }
  if(otherPending.length){
    h+=`<div class="banner banner-warn" style="margin-bottom:7px">A pending order is still on file from an older count. Review or receive it on the Receive tab.</div>`;
  }

  if(!rawRecommended.length && !pendingForLatest){
    return h+`<div class="empty" style="color:#166534">✓ All items at or above par — no order needed!</div>`;
  }
  if(rawRecommended.length && !orderItems.length && !pendingForLatest){
    h+=`<div class="banner banner-info" style="margin-bottom:8px;line-height:1.45">Every recommended line is set to <strong>not order</strong> for this run. Tap <strong>Restore</strong> on a line to put it back on the list.</div>`;
    removedFromOrder.forEach(it=>{
      h+=`<div class="card" style="margin-bottom:6px;opacity:.92">
        <div class="item-name" style="font-size:14px">${escapeHtml(it.name)}</div>
        <div class="item-meta">${escapeHtml(it.cat_l1)} › ${escapeHtml(it.cat_l2)} · would order <b>${it.toOrder}</b> ${escapeHtml(itemOrderUnitLabel(it))}</div>
        <button type="button" class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="restoreRecommendedLine('${it.id}')">Restore to order</button>
      </div>`;
    });
    h+=`<div class="sticky-footer">
    <div class="sticky-footer-row">
      <button class="btn btn-secondary" onclick="window.print()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Print
      </button>
      <button class="btn btn-primary" disabled title="Restore at least one line to log an order">Log Order Placed</button>
    </div>
    ${stickyFooterCopyright()}
  </div>`;
    return h;
  }
  if(!rawRecommended.length && pendingForLatest){
    h+=`<div class="empty" style="padding-top:4px">No lines below par to recommend. Delete the saved order above if you need to log a different order from this same count.</div>
  <div class="sticky-footer">
    <div class="sticky-footer-row">
      <button class="btn btn-secondary" onclick="window.print()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Print
      </button>
      <button class="btn btn-primary" disabled title="An order is already logged for this count">Log Order Placed</button>
    </div>
    ${stickyFooterCopyright()}
  </div>`;
    return h;
  }

  const flags=getOrderAckFlags(orderItems);
  const n=orderItems.length;
  const sumQty=orderItems.reduce((s,it)=>s+it.toOrder,0);
  const acked=orderItems.filter(it=>flags[it.id]).length;

  h+=`<div class="seg-row">
    <button type="button" class="seg${S.orderView==='list'?' on':''}" onclick="setOrderView('list')">Full list</button>
    <button type="button" class="seg${S.orderView==='walk'?' on':''}" onclick="setOrderView('walk')">Walk-through</button>
  </div>
  <div class="order-sum-card">
    <div class="order-sum-grid">
      <div><div class="order-sum-v">${n}</div><div class="order-sum-l">Line items</div></div>
      <div><div class="order-sum-v">${sumQty}</div><div class="order-sum-l">Qty total</div></div>
      <div><div class="order-sum-v" style="color:${acked===n?'#166534':'var(--ck-red)'}">${acked}/${n}</div><div class="order-sum-l">Scanned</div></div>
    </div>
    <div class="order-sum-note">Qty total sums every line’s “to order” amount (mixed units). Use line items + qty total + scanned count to match another device while scanning this order in.</div>
  </div>`;

  if(S.orderView==='list'){
    h+=`<div class="order-hide-scanned-row">
      <input type="checkbox" id="order-hide-scanned"${S.orderListHideScanned?' checked':''} onchange="setOrderListHideScanned(this.checked)">
      <label for="order-hide-scanned">Hide scanned items</label>
    </div>`;
  }

  if(S.orderView==='walk'){
    S.orderWalkIndex=Math.max(0,Math.min(S.orderWalkIndex,orderItems.length-1));
    const item=orderItems[S.orderWalkIndex];
    const ack=!!flags[item.id];
    const opts=orderItems.map((it,i)=>`<option value="${i}"${i===S.orderWalkIndex?' selected':''}>${escapeHtml(it.name)} — ${it.toOrder} ${escapeHtml(itemOrderUnitLabel(it))}</option>`).join('');
    h+=`<div class="walk-bar" style="margin-bottom:8px">
      <select aria-label="Jump to item" style="width:100%;padding:7px 8px;border-radius:7px;border:1px solid var(--ck-line);font-size:12px;font-family:inherit;background:#fff;color:#111" onchange="orderWalkPick(parseInt(this.value,10))">${opts}</select>
      <div class="walk-pos" style="text-align:center;margin-top:4px;font-size:11px;color:#9ca3af">Item ${S.orderWalkIndex+1} of ${n}</div>
    </div>
    <div class="card walk-card ord-card${ack?' ord-acked':''}">
      <div class="walk-breadcrumb">${escapeHtml(item.cat_l1)} › ${escapeHtml(item.cat_l2)}</div>
      <div class="walk-name">${escapeHtml(item.name)}</div>
      <div class="walk-meta">On hand <b>${fmtQty(item.onHandCountUnit??item.onHand)}</b> ${escapeHtml(item.unit)} · Par <b style="color:var(--ck-red)">${fmtQty(item.parCountUnit??item.par)}</b> ${escapeHtml(item.unit)} · ${escapeHtml(triggerMetaLabel(item))}${item.orderBonus!==0?` · Manual <b>${fmtManualAdj(item.orderBonus)}</b> ${escapeHtml(itemOrderUnitLabel(item))}`:''} · <span class="mono">${escapeHtml(itemScanMeta(item))}</span></div>
      <div class="order-list-bc-row order-walk-bcs-row">
        <div class="order-list-bc-bar"><div id="bc-${item.id}"><span style="font-size:11px;color:#9ca3af">Generating code…</span></div></div>
        <div class="order-list-bc-qty">
          <div class="order-rec-qty">${item.toOrder}</div>
          <div class="order-rec-qty-lbl">${escapeHtml(itemOrderUnitLabel(item))} to order</div>
        </div>
        <button type="button" class="order-ack-btn order-ack-btn-list${ack?' on':' order-ack-btn-pending'}" aria-pressed="${ack?'true':'false'}" aria-label="${ack?'Scanned — confirmed on order device':'Scanned — tap when entered on order device'}" onclick="toggleOrderAck('${item.id}')">${ack?'<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>':''}<span class="order-ack-title">Scanned</span><span class="order-ack-sub">${ack?'On order device':'Tap when entered'}</span></button>
      </div>
      <div class="walk-nav" style="margin-top:10px">
        <button type="button" class="btn btn-secondary" onclick="orderWalkGo(-1)" ${S.orderWalkIndex<=0?'disabled':''}>Previous</button>
        <button type="button" class="btn btn-primary" onclick="orderWalkGo(1)" ${S.orderWalkIndex>=n-1?'disabled':''}>Next</button>
      </div>
      ${pendingForLatest?'':`<div style="margin-top:10px;text-align:center">
        <button type="button" class="btn btn-ghost btn-sm" style="color:#6b7280" onclick="excludeRecommendedLine('${item.id}')">Remove from this order</button>
      </div>`}
    </div>`;
  }else{
    const listItems=S.orderListHideScanned?orderItems.filter(it=>!flags[it.id]):orderItems;
    if(!listItems.length&&orderItems.length){
      h+=`<div class="empty" style="padding:18px 12px;font-size:12px;line-height:1.45">Every recommended line is marked scanned, or nothing is left to show. Uncheck <strong>Hide scanned items</strong> above to see all lines again.</div>`;
    }
    listItems.forEach(item=>{
      const ack=!!flags[item.id];
      h+=`<div class="ord-card${ack?' ord-acked':''}">
      <div class="ord-top">
        <div>
          <div class="item-name" style="font-size:14px">${escapeHtml(item.name)}</div>
          <div class="item-meta">${escapeHtml(item.cat_l1)} › ${escapeHtml(item.cat_l2)}</div>
          <div class="item-meta">On hand: <span style="color:var(--ck-red-dark);font-weight:600">${fmtQty(item.onHandCountUnit??item.onHand)}</span> ${escapeHtml(item.unit)} · Par: <span style="font-weight:600">${fmtQty(item.parCountUnit??item.par)}</span> ${escapeHtml(item.unit)} · ${escapeHtml(triggerMetaLabel(item))}${item.orderBonus!==0?` · Manual <b>${fmtManualAdj(item.orderBonus)}</b> ${escapeHtml(itemOrderUnitLabel(item))}`:''}</div>
        </div>
      </div>
      <div class="order-list-bc-row">
        <div class="order-list-bc-bar"><div id="bc-${item.id}"><span style="font-size:11px;color:#9ca3af">Generating code…</span></div></div>
        <div class="order-list-bc-qty">
          <div class="order-rec-qty">${item.toOrder}</div>
          <div class="order-rec-qty-lbl">${escapeHtml(itemOrderUnitLabel(item))} to order</div>

function drawBarcodes(){
  if(S.tab!=='order') return;
  const QCtor=typeof globalThis!=='undefined'?globalThis.QRCode:null;
  const BCTor=typeof globalThis!=='undefined'?globalThis.JsBarcode:null;
  const mode=normalizeBarcodeMode(S.barcodeMode);
  const orderItems=orderTabLineItems();
  for(const item of orderItems){
    const wrap=document.getElementById('bc-'+item.id);
    const code=itemScanCode(item);
    if(!wrap||!code) continue;
    wrap.innerHTML='';
    if(mode==='barcode'){
      if(!BCTor){
        wrap.innerHTML=`<span class="mono" style="font-size:12px;padding:4px 8px;background:#f3f4f6;border-radius:6px;display:inline-block">${escapeHtml(code)}</span>`;
        continue;
      }
      try{
        const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
        wrap.appendChild(svg);
        BCTor(svg, code, {
          format:'CODE128',
          width:1.6,
          height:42,
          margin:0,
          displayValue:false,
          lineColor:'#111111',
          background:'#ffffff'
        });
        const cap=document.createElement('div');
        cap.className='mono';
        cap.style.cssText='font-size:10px;text-align:center;margin-top:4px;color:#6b7280;word-break:break-all;line-height:1.2';
        cap.textContent=code;
        wrap.appendChild(cap);
      }catch(e){
        wrap.innerHTML=`<span class="mono" style="font-size:12px;padding:4px 8px;background:#f3f4f6;border-radius:6px;display:inline-block">${escapeHtml(code)}</span>`;
      }
      continue;
    }
    if(!QCtor){
      wrap.innerHTML=`<span class="mono" style="font-size:12px;padding:4px 8px;background:#f3f4f6;border-radius:6px;display:inline-block">${escapeHtml(code)}</span>`;
      continue;
    }
    try{
      const holder=document.createElement('div');
      holder.style.cssText='display:inline-block;line-height:0;max-width:100%';
      wrap.appendChild(holder);
      const qrText=mode==='qr8'
        ? String.fromCharCode(...Array.from(new TextEncoder().encode(code)))
        : code;
      new QCtor(holder,{
        text:qrText,
        width:mode==='qr8'?64:72,
        height:mode==='qr8'?64:72,
        colorDark:'#111111',
        colorLight:'#ffffff',
        correctLevel:mode==='qr8'?QCtor.CorrectLevel.L:QCtor.CorrectLevel.M
      });
      const cap=document.createElement('div');
      cap.className='mono';
      cap.style.cssText='font-size:10px;text-align:center;margin-top:4px;color:#6b7280;word-break:break-all;line-height:1.2';
      cap.textContent=code;
      wrap.appendChild(cap);
    }catch(e){
      wrap.innerHTML=`<span class="mono" style="font-size:12px;padding:4px 8px;background:#f3f4f6;border-radius:6px;display:inline-block">${escapeHtml(code)}</span>`;
    }
  }
}

  const ordEntries=Object.entries(order.items||{});

  origLines.forEach(([itemId,data])=>{
    const item = S.items.find(i=>i.id===itemId);

    const confirmed=!!confirmFlags[itemId];
    const recN=parseFloat(data&&data.recommended);
    const recDisp=Number.isFinite(recN)?recN:0;
    h+=`<div class="item-row recv-item-row${confirmed?' recv-confirmed':''}">
      <div>
        <div class="item-name">${escapeHtml(item.name)}</div>
        <div class="item-meta">Ordered: <span style="color:var(--ck-red);font-weight:600">${recDisp}</span> ${escapeHtml(itemOrderUnitLabel(item))}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <input class="qinput" type="number" min="0" step="0.5" id="recv-${itemId}" placeholder="${recDisp}">
        <span class="ulbl">${escapeHtml(itemOrderUnitLabel(item))}</span>
        <button type="button" class="order-ack-btn order-ack-btn-list recv-confirm-btn${confirmed?' on':' order-ack-btn-pending'}" aria-pressed="${confirmed?'true':'false'}" aria-label="${confirmed?'Confirmed as received':'Tap to confirm this line item was received'}" onclick="toggleReceiveConfirm('${order.id}',JSON.parse(decodeURIComponent('${encAttr(itemId)}')))">${confirmed?'<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>':''}<span class="order-ack-title">Confirmed</span><span class="order-ack-sub">${confirmed?'Checked in truck':'Tap when checked'}</span></button>
      </div>
    </div>`;
  });
  h+='</div>';

  const existingIds=new Set(Object.keys(order.items||{}));
  const addable=S.items.filter(it=>!existingIds.has(it.id));
  const extraOpts=addable.map(it=>`<option value="${escapeHtml(it.id)}">${escapeHtml(it.name)}</option>`).join('');

    <div class="card-hdr-static"><span style="font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.07em">Extras (autoship / not on order)</span></div>
    <div style="padding:8px 10px;font-size:11px;color:#6b7280;line-height:1.45">Add lines for product that arrived but was not on your saved order. They are stored on this receipt so <strong>usage</strong> can include what you actually put away.</div>`;
  if(extraLines.length){
    extraLines.forEach(([itemId,data])=>{
      const item=S.items.find(i=>i.id===itemId);
      if(!item) return;
      h+=`<div class="item-row" style="background:#fafafa">
        <div>
          <div class="item-name">${escapeHtml(item.name)} <span class="badge info" style="font-size:9px">Extra</span></div>
          <div class="item-meta">Not on original order · ${escapeHtml(itemOrderUnitLabel(item))}</div>

        <div style="display:flex;align-items:center;gap:8px">
          <input class="qinput" type="number" min="0" step="0.5" id="recv-${itemId}" placeholder="0">
          <span class="ulbl">${escapeHtml(itemOrderUnitLabel(item))}</span>
          <button type="button" class="btn btn-ghost btn-sm" style="padding:4px 8px" onclick="receiveRemoveExtraLine('${order.id}',JSON.parse(decodeURIComponent('${encAttr(itemId)}')))" title="Remove this line">Remove</button>
        </div>

    });
  }
  if(addable.length){
    h+=`<div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:8px 10px 10px;border-top:1px solid #f4f4f5">
      <select id="recv-extra-item" class="finput" style="flex:1;min-width:160px;margin:0;font-size:12px" aria-label="Item to add as extra">
        <option value="">Choose item…</option>
        ${extraOpts}

  }else if(!extraLines.length){
    h+=`<div style="padding:8px 10px 10px;font-size:11px;color:#9ca3af;border-top:1px solid #f4f4f5">Every catalog item is already listed on this receipt.</div>`;
  }else{
    h+=`<div style="padding:8px 10px 10px;font-size:11px;color:#9ca3af;border-top:1px solid #f4f4f5">No more items to add from your catalog.</div>`;
  }
  h+='</div>';

  const notesVal=escapeHtml(order.order_notes||'');
  h+=`<div class="card" style="margin-top:8px">
    <div class="card-hdr-static"><span style="font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.07em">Receipt notes</span></div>

  h+=`<div class="sticky-footer">

      <button class="btn btn-primary" onclick="confirmReceive('${order.id}')">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        Confirm Receipt
      </button>
    </div>
    ${stickyFooterCopyright()}
  </div>`;
  return h;
}

function receiveAddExtraLine(orderId){
  const sel=document.getElementById('recv-extra-item');
  if(!sel||!sel.value){ alert('Choose an item to add.'); return; }
  const itemId=sel.value;
  const order=S.orders.find(o=>o.id===orderId);
  if(!order||!order.items) return;
  if(order.items[itemId]){ alert('That item is already on this receipt.'); return; }
  order.items[itemId]={recommended:0,received:null,extraLine:true};
  ls.set('orders',S.orders);
  render();
}

function receiveRemoveExtraLine(orderId,itemId){
  const order=S.orders.find(o=>o.id===orderId);
  if(!order||!order.items||!order.items[itemId]||!order.items[itemId].extraLine) return;
  delete order.items[itemId];
  ls.set('orders',S.orders);
  render();
}

// ── USAGE TAB ────────────────────────────────────────────────────────────────
function renderUsage(){
  const gate=renderFeatureGateBanner('usage');
  if(gate){
    return `
    <div class="pg-hdr">
      <div><div class="pg-title">Usage</div><div class="pg-sub">Subscription required</div></div>
    </div>
    ${gate}`;
  }
  const usage = computeUsage();
  const withData = Object.values(usage).filter(u=>u.avg!==null).sort((a,b)=>(b.avgWeekly||0)-(a.avgWeekly||0));
  const recvd = S.orders.filter(o=>o.status==='received');
  const weekRollup = buildUsageWeekRollup(usage);
  const maxWeekly = withData.length ? Math.max(...withData.map(u=>u.avgWeekly||0), 0.0001) : 1;

  let h=`
  <div class="pg-hdr">
    <div>
      <div class="pg-title">Usage</div>
      <div class="pg-sub">By calendar week (Mon–Sun) · avg / week = mean of weekly totals</div>
    </div>
  </div>
  <div class="metrics" style="grid-template-columns:repeat(2,1fr)">
    <div class="metric"><div class="metric-v">${S.sessions.length}</div><div class="metric-l">counts</div></div>
    <div class="metric"><div class="metric-v">${recvd.length}</div><div class="metric-l">delivery cycles</div></div>
    <div class="metric"><div class="metric-v">${withData.length}</div><div class="metric-l">items tracked</div></div>
    <div class="metric"><div class="metric-v">${weekRollup.length}</div><div class="metric-l">calendar weeks</div></div>
  </div>`;

  if(!withData.length){
    h+=`<div class="empty">
      Usage data unlocks after completing a full cycle:<br><br>
      <strong>Count → Place Order → Receive Truck → Count Again</strong>
    </div>`;
    return h;
  }

  if(weekRollup.length){
    h+=`<div class="card usage-week-card">
      <div class="card-hdr-static">
        <span style="font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.07em">Usage by week</span>
      </div>`;
    weekRollup.forEach(week=>{
      h+=`<div style="padding:10px;border-bottom:1px solid #f4f4f5">
        <div class="usage-week-hdr">${escapeHtml(week.label)}</div>
        <div class="usage-week-sub">${week.lines.length} item${week.lines.length!==1?'s':''} with usage this week</div>`;
      week.lines.forEach(row=>{
        h+=`<div class="usage-week-line">
          <span>${escapeHtml(row.name)}</span>
          <span class="usage-week-used">${row.used.toFixed(1)} <span style="color:#9ca3af;font-weight:500">${escapeHtml(row.unit)}</span></span>
        </div>`;
      });
      h+=`</div>`;
    });
    h+=`</div>`;
  }

  h+=`<div class="card">
    <div class="card-hdr-static">
      <span style="font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.07em">By item</span>
    </div>`;
  Object.values(usage).forEach(u=>{
    const aw = u.avgWeekly;
    const bar = aw!=null ? Math.min(100, Math.round(aw / maxWeekly * 100)) : 0;
    const parRatio = aw!=null && u.par ? aw / u.par : null;
    let parNote='';
    if(parRatio!==null){
      if(parRatio>0.9) parNote=`<span class="badge warn" style="font-size:10px">Par may be low</span>`;
      else if(parRatio<0.3) parNote=`<span class="badge" style="font-size:10px">Par may be high</span>`;
    }
    const chips = (u.weekKeys||[]).slice(-8).map(wk=>{
      const short = new Date(wk+'T12:00:00').toLocaleDateString('en-US',{month:'numeric',day:'numeric'});
      return `<span class="usage-chip">${short}: ${u.byWeek[wk].toFixed(1)}</span>`;
    }).join('');
    h+=`<div class="item-row" style="flex-direction:column;align-items:stretch;gap:4px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="item-name">${escapeHtml(u.name)}</div>
          <div class="item-meta">${escapeHtml(u.cat_l1)} › ${escapeHtml(u.cat_l2)} · ${u.usages.length} cycle${u.usages.length!==1?'s':''}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:8px">
          ${aw!=null?`
            <div style="font-size:18px;font-weight:700;font-family:'SF Mono',monospace;color:var(--ck-red);line-height:1">${aw.toFixed(1)}</div>
            <div class="ulbl">avg ${escapeHtml(u.unit)}/wk</div>
            <div class="usage-stat-sub">${u.weekKeys.length} active week${u.weekKeys.length!==1?'s':''} · ${u.avg.toFixed(1)} avg / cycle</div>
            <div style="margin-top:4px">${parNote}</div>
          `:`<div style="font-size:11px;color:#9ca3af">pending</div>`}
        </div>
      </div>
      ${aw!=null?`<div style="display:flex;align-items:center;gap:6px">
        <div class="usage-bar-wrap" style="flex:1"><div class="usage-bar-fill" style="width:${bar}%"></div></div>
        <span style="font-size:10px;color:#9ca3af;flex-shrink:0">Par: ${u.par}</span>
      </div>`:''}
      ${chips?`<div class="usage-chip-row">${chips}</div>`:''}
    </div>`;
  });
  h+='</div>';

  h+=`<div style="font-size:10px;color:#9ca3af;text-align:center;margin-top:6px;padding:0 8px;line-height:1.45">
    <strong>Avg / wk</strong> is the average of each week’s total for that item (multiple deliveries in the same week are summed).<br>
    <strong>Par hints</strong> compare avg / wk to par: low = over 90% of par per week; high = under 30%.
  </div>`;
  return h;
}

function canAccessFeature(feature){
  const access=S.featureAccess||{};
  if(feature==='count') return access.count!==false;
  if(feature==='order') return access.ordering!==false;
  if(feature==='receive') return access.receive!==false;
  if(feature==='usage') return access.usage!==false;
  return true;
}

function renderFeatureGateBanner(feature){
  if(canAccessFeature(feature)) return '';
  const source=String((S.featureAccess&&S.featureAccess.source)||'subscription');
  if(source==='trial_expired'){
    return `<div class="banner banner-warn" style="margin-bottom:8px;line-height:1.45">Your ${DEFAULT_TRIAL_DAYS}-day trial for Ordering and Usage has ended. Contact your admin to activate a paid plan or set this store to free.</div>`;
  }
  return `<div class="banner banner-warn" style="margin-bottom:8px;line-height:1.45">This feature is disabled by current subscription settings.</div>`;
}

function updateFeatureAccessFromSnapshot(snapshot){
  const base={count:true,ordering:true,receive:true,usage:true,source:'legacy'};
  S.billingCtx=snapshot||null;
  if(!snapshot||!Array.isArray(snapshot.subscriptions)){
    S.featureAccess=base;
    return;
  }
  const subs=snapshot.subscriptions.filter(s=>String(s&&s.store_id||'').trim()===ACTIVE_STORE.id);
  if(!subs.length){
    S.featureAccess=base;
    return;
  }
  const now=Date.now();
  let allowOrdering=false;
  let source='subscription';
  for(const sub of subs){
    const status=String(sub&&sub.status||'').toLowerCase();
    const isFree=!!(sub&&sub.is_free) || status==='free';
    if(isFree){
      allowOrdering=true;
      source='free';
      break;
    }
    if(status==='active'){
      allowOrdering=true;
      source='active';
      break;
    }
    if(status==='trialing'){
      const endTs=Date.parse(sub&&sub.trial_ends_at||'');
      if(!Number.isNaN(endTs)&&endTs>=now){
        allowOrdering=true;
        source='trialing';
        break;
      }
      source='trial_expired';
    }
  }
  S.featureAccess={
    count:true,
    ordering:allowOrdering,
    receive:allowOrdering,
    usage:allowOrdering,
    source
  };
}

// ─── URL / history (hash routes: #/count, #/count/walk, #/order/walk, #/receive, …) ─
let __ckUrlBoot=true;
let __ckUrlApplying=false;

async function loadCkLogic(){
  if(window.__CK_LOGIC) return;
  window.__CK_LOGIC=await import('./lib/ck-logic.mjs');
}

function applyRouteFromHash(){
  if(__ckUrlApplying||!window.__CK_LOGIC) return;
  const CK=window.__CK_LOGIC;
  const prevTab=S.tab;
  __ckUrlApplying=true;
  try{
    const {tab,sub}=CK.parseRouteHash(location.hash);
    const valid=['count','order','receive','usage','setup','help'];
    S.tab=valid.includes(tab)?tab:'count';
    S.historyMode=S.tab==='count'&&sub==='history';
    if(S.tab==='count'){
      S.countView=(sub==='walk'&&!S.historyMode)?'walk':'list';
    }else{
      S.countView='list';
    }
    if(S.tab==='order') S.orderView=sub==='walk'?'walk':'list';
    else S.orderView='list';
    if(S.tab!=='count') S.historyMode=false;
    if(S.initialSetupActive){
      // New stores must stay on the par walkthrough until setup is finished.
      S.tab='count';
      S.historyMode=false;
      S.countView='walk';
    }
    const want=CK.buildRouteHash(S.tab,{countView:S.countView,orderView:S.orderView,historyMode:S.historyMode});
    if(S.initialSetupActive&&location.hash!==want){
      history.replaceState(null,'',location.pathname+location.search+want);
    }else if(!location.hash||location.hash==='#'){
      history.replaceState(null,'',location.pathname+location.search+want);
    }
    __ckUrlBoot=false;
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
    const tb=document.getElementById('t-'+S.tab); if(tb) tb.classList.add('on');
    syncCountFormAvailability();
    if(prevTab!=='count'&&S.tab==='count'&&hasActiveCountDraft()) S.countDraftPrompt=true;
    if(prevTab==='count'&&S.tab!=='count') dismissCountDraftPrompt();
  }finally{
    __ckUrlApplying=false;
  }
}

function syncUrlFromState(){
  if(__ckUrlApplying||!window.__CK_LOGIC) return;
  const CK=window.__CK_LOGIC;
  const want=CK.buildRouteHash(S.tab,{countView:S.countView,orderView:S.orderView,historyMode:S.historyMode});
  if(location.hash===want) return;
  const full=location.pathname+location.search+want;
  if(__ckUrlBoot){
    history.replaceState(null,'',full);
    __ckUrlBoot=false;
  }else{
    history.pushState(null,'',full);
  }
}

  const items=S.items, d=S.draft;

  const pct=items.length?Math.round(counted/items.length*100):0;

async function saveEditSession(sessionId){
  if(isAppBusy()) return;
  const sess = S.sessions.find(s=>s.id===sessionId);
  if(!sess) return;
  const merged = {...sess.counts,...S.editDraft};
  try{
    setSyncing(true,'Saving count changes…');
    await db.updateSessionCounts(sessionId, merged);
    sess.counts = merged;
    ls.set('sessions',S.sessions);
    setSyncOk();
    S.editSessionId=null; S.editDraft={};
    showBanner('Count updated!','ok');
    render();
  }catch(e){
    sess.counts = merged;
    ls.set('sessions',S.sessions);
    setSyncErr(e.message);
    S.editSessionId=null; S.editDraft={};
    render();
  }
}

async function deleteSession(sessionId){
  if(!confirm('Delete this inventory session? This will also affect usage calculations.')) return;
  if(isAppBusy()) return;
  try{
    setSyncing(true,'Deleting session…');
    await db.deleteSession(sessionId);
    S.sessions = S.sessions.filter(s=>s.id!==sessionId);
    ls.set('sessions',S.sessions);
    setSyncOk();
    S.editSessionId=null; S.editDraft={};
    syncCountFormAvailability();
    render();
  }catch(e){
    setSyncErr(e.message);
    render();
  }
}

async function completeInventory(){
  if(isAppBusy()) return;
  const activeDraft=hasActiveCountDraft()?S.countDraftSession:null;
  const id = activeDraft&&activeDraft.id ? activeDraft.id : makeEntityId('sess');
  const countedAt = new Date().toISOString();
  const counts = {};
  S.items.forEach(i=>{ counts[i.id]=parseFloat(S.draft[i.id])||0; });
  const sess = {id,counted_at:countedAt,notes:'',status:'final',counts};
  try{
    setSyncing(true,'Saving inventory…');
    await db.saveSession(id,countedAt,counts,{status:'final',notes:''});
    S.sessions.unshift(sess);
    ls.set('sessions',S.sessions);
    setCountDraftSessionState(null,{clearDraft:true});
    setSyncOk();
    S.countView='list';
    S.countDraftPrompt=false;
    S.countManualOrderOpen=false;
    syncCountFormAvailability();
    showBanner('Inventory saved — '+S.items.length+' items recorded!','ok');
    setTab('order');
  }catch(e){
    S.sessions.unshift(sess);
    ls.set('sessions',S.sessions);
    setCountDraftSessionState(null,{clearDraft:true});
    setSyncErr(e.message);
    S.countView='list';
    S.countDraftPrompt=false;
    S.countManualOrderOpen=false;
    syncCountFormAvailability();
    render();
  }
}

async function logOrder(){
  if(isAppBusy()) return;
  if(pendingOrderForLatestCount()){
    showBanner('An order is already logged for this count. Delete it on the Order tab first, or confirm it on Receive.','warn');
    return;
  }
  const orderItems = recommendedOrderLines();
  if(!orderItems.length){
    showBanner('No lines left on this order — restore a removed item or nothing will be saved.','warn');
    return;
  }
  const ackFlags=getOrderAckFlags(orderItems);
  const allScanned=orderItems.every(it=>!!ackFlags[it.id]);
  if(!allScanned){
    if(!confirm('Not all recommended items have been marked scanned. Do you still wish to save the order?')) return;
  }
  const id = makeEntityId('ord');
  const orderedAt = new Date().toISOString();
  const sessionId = S.sessions[0]?.id;
  const items = {};
  orderItems.forEach(i=>{ items[i.id]={recommended:i.toOrder,received:null}; });
  const order = {id,ordered_at:orderedAt,session_id:sessionId,status:'pending',items};
  try{
    setSyncing(true,'Placing order…');
    await db.saveOrder(id,orderedAt,sessionId,items);
    S.orders.unshift(order);
    ls.set('orders',S.orders);
    setSyncOk();
    try{ ls.set('orderAck',null); }catch{}
    clearOrderManualAdj();
    clearOrderRecExcludedForSession(sessionId);
    showBanner('Order logged! Head to Receive when the truck arrives.','ok');
    setTab('receive');
  }catch(e){
    S.orders.unshift(order);
    ls.set('orders',S.orders);
    setSyncErr(e.message);
    render();
  }
}

async function confirmReceive(orderId){
  if(isAppBusy()) return;
  const order=S.orders.find(o=>o.id===orderId);
  if(!order) return;
  normalizeOrderReceiptData(order);
  const CK=window.__CK_LOGIC;
  const receivedMap=CK.buildReceivedQuantitiesMap(order.items, id=>{
    const inp=document.getElementById('recv-'+id);
    return inp?inp.value:null;
  });
  const notesEl=document.getElementById('recv-notes-input');
  const orderNotes=notesEl?String(notesEl.value||'').trim():'';
  const confirmedMap={...getReceiveConfirmFlags(order)};
  let ok=false;
  try{
    setSyncing(true,'Confirming receipt…');
    await db.confirmReceipt(orderId,receivedMap,order.items,{orderNotes,confirmedMap});
    order.status='received';
    order.received_at=new Date().toISOString();
    order.order_notes=orderNotes;
    order.confirmed_map=confirmedMap;
    Object.entries(receivedMap).forEach(([id,v])=>{ if(order.items[id]) order.items[id].received=v; });
    ls.set('orders',S.orders);
    setSyncOk();
    ok=true;
  }catch(e){
    setSyncErr(e.message);
  }
  if(ok){
    showBanner('Truck order received! Take your next count to track usage.','ok');
  }
  render();
}

function clearQuickEditItemCode(){
  S.setupCodeEditId=null;
  S.setupCodeDraft='';
  S.setupCodeSavingId=null;

  S.setupCodeLastTapAt=0;
}

function handleQuickEditItemCodeTap(_ev,id){
  if(S.setupCodeEditId||isAppBusy()) return;
  const now=Date.now();
  const isDoubleTap=S.setupCodeLastTapId===id && (now-S.setupCodeLastTapAt)<=420;
  if(isDoubleTap){
    S.setupCodeLastTapId=null;
    S.setupCodeLastTapAt=0;
    startQuickEditItemCode(id);
    return;
  }
  S.setupCodeLastTapId=id;
  S.setupCodeLastTapAt=now;
}

function focusSetupCodeInput(itemId){
  requestAnimationFrame(()=>{
    const input=document.getElementById(`setup-code-input-${itemId}`);
    if(!input) return;
    try{
      input.focus({preventScroll:true});
      input.select();
    }catch{}
  });
}

function startQuickEditItemCode(id){
  const item=S.items.find(i=>i.id===id);
  if(!item||isAppBusy()) return;
  S.setupCodeEditId=id;
  S.setupCodeDraft=String(item.upc||'');
  S.setupCodeSavingId=null;
  render();
  focusSetupCodeInput(id);
}

function setQuickEditItemCodeDraft(v){
  S.setupCodeDraft=String(v??'');
}

function quickEditItemCodeKeydown(ev,id){
  if(ev.key==='Escape'){
    ev.preventDefault();
    cancelQuickEditItemCode();
    return;
  }
  if(ev.key==='Enter'){
    ev.preventDefault();
    void commitQuickEditItemCode(id);
  }
}

function quickEditItemCodeBlur(ev,id){
  if(!S.setupCodeEditId||S.setupCodeEditId!==id) return;
  const next=ev&&ev.relatedTarget;
  if(next&&next.closest&&next.closest('.setup-code-actions')) return;
  void commitQuickEditItemCode(id);
}

function cancelQuickEditItemCode(){
  if(S.setupCodeSavingId) return;
  clearQuickEditItemCode();
  render();
}

async function commitQuickEditItemCode(id){
  if(S.setupCodeEditId!==id||S.setupCodeSavingId===id||isAppBusy()) return;
  const idx=S.items.findIndex(i=>i.id===id);
  if(idx<0){ clearQuickEditItemCode(); render(); return; }
  const item=S.items[idx];
  const nextCode=String(S.setupCodeDraft||'').trim();
  const currentCode=String(item.upc||'').trim();
  if(nextCode===currentCode){
    clearQuickEditItemCode();
    render();
    return;
  }
  const updated={...item,upc:nextCode};
  S.setupCodeSavingId=id;
  render();
  try{
    setSyncing(true,'Saving UPC…');
    await db.upsertItem(updated);
    S.items[idx]=updated;
    ls.set('items',S.items);
    setSyncOk();
    clearQuickEditItemCode();
    showBanner('UPC updated.','ok');
    render();
  }catch(e){
    S.setupCodeSavingId=null;
    setSyncErr(e.message);
    render();
    focusSetupCodeInput(id);
  }
}

function normalizeImportedTemplate(text){
  const parsed=JSON.parse(text);
  const arr=Array.isArray(parsed)?parsed:(Array.isArray(parsed&&parsed.items)?parsed.items:null);
  if(!arr||!arr.length) throw new Error('Template must include a non-empty items array.');
  const out=arr.map((row,ix)=>{
    const unit=String(row&&row.unit||'').trim()||'cs';
    const par=parseFloat(row&&row.par);
    const pack=parseFloat(row&&row.order_pack_qty);
    const trigRaw=String((row && row.reorder_trigger) ?? '').trim();
    const trigNum=parseFloat(trigRaw);
    return {
      id:makeEntityId('item'),
      name:String(row&&row.name||`Item ${ix+1}`),
      cat_l1:String(row&&row.cat_l1||'Other'),
      cat_l2:String(row&&row.cat_l2||'General'),
      par:Number.isFinite(par)&&par>0?par:1,
      unit,
      code:String(row&&row.code||''),
      upc:String(row&&row.upc||''),
      order_unit:String(row&&row.order_unit||'').trim()||unit,
      order_pack_qty:Number.isFinite(pack)&&pack>0?pack:1,
      reorder_trigger:trigRaw===''?null:(Number.isFinite(trigNum)?trigNum:null),
      sort_order:Number.isFinite(parseFloat(row&&row.sort_order))?parseFloat(row.sort_order):(ix+1)
    };
  });
  return out;
}

async function importItemSeedTemplate(){
  if(isAppBusy()) return;

  if(!raw||!String(raw).trim()) return;

    await db.replaceItemsForStore(ACTIVE_STORE.id, rows);

    ls.set('items',S.items);

      template_store_id:ACTIVE_STORE.id,
      seed_source:'manual_import_template',

async function saveItem(){
  if(isAppBusy()) return;
  const f=S.formData||{};
  if(!f.name||!f.cat_l1||!f.par){ alert('Name, Category Level 1, and Par Level are required.'); return; }
  const existing=S.formView==='edit'?S.items.find(i=>i.id===S.editItemId):null;
  const scope=parseScopeFromForm();
  const targetStoreIds=resolveStoreIdsForScope(scope,S.billingCtx);
  if(!targetStoreIds.length){
    alert('Select at least one store to apply this item change.');
    return;
  }
  const orderPackQtyRaw=parseFloat(f.order_pack_qty);
  const baseItem={
    id: S.formView==='add'?makeEntityId('item'):S.editItemId,
    name:f.name, cat_l1:f.cat_l1, cat_l2:f.cat_l2||'',
    par:parseFloat(f.par)||1,
    unit:f.unit||'cs',
    order_unit:String(f.order_unit||f.unit||'cs').trim()||String(f.unit||'cs').trim()||'cs',
    order_pack_qty:Number.isFinite(orderPackQtyRaw)&&orderPackQtyRaw>0?orderPackQtyRaw:1,
    reorder_trigger:String(f.reorder_trigger??'').trim()===''?null:(Number.isFinite(parseFloat(f.reorder_trigger))?parseFloat(f.reorder_trigger):null),
    upc:String(f.upc||'').trim(),
    code:f.code||'',
    sort_order: existing!=null&&Number.isFinite(parseFloat(existing.sort_order))?parseFloat(existing.sort_order):S.items.length+1
  };
  const suffix=S.formView==='edit'
    ? itemIdSuffix(S.editItemId)
    : (String(f.seed_key||'').trim()||itemIdSuffix(baseItem.id)||makeEntityId('item').split(':').slice(1).join(':'));
  const item={...baseItem,id:suffix,seed_key:suffix};
  try{
    setSyncing(true,'Saving item…');
    const updatedStoreIds=await db.upsertItemsForScope(scope.mode,targetStoreIds,item,{insertMissing:true});
    const affectsActive=updatedStoreIds.includes(ACTIVE_STORE.id);
    if(affectsActive){
      const scopedId=scopedItemIdForStore(ACTIVE_STORE,item.seed_key);
      const activeItem={...item,id:scopedId,store_id:ACTIVE_STORE.id};
      if(S.formView==='add') S.items.push(activeItem);
      else {
        const idx=S.items.findIndex(i=>i.id===S.editItemId||i.id===scopedId);
        if(idx>=0) S.items[idx]=activeItem;
      }
      S.items=normalizeItemsForOrderMath(S.items);
      ls.set('items',S.items);
    }
    setSyncOk();
    S.formView=null; S.editItemId=null; S.formData=null;
    showBanner(`Item saved to ${itemSeedScopeLabel(scope.mode)} (${updatedStoreIds.length} store${updatedStoreIds.length===1?'':'s'}).`,'ok');
    render();
  }catch(e){
    setSyncErr(e.message);
    render();
  }
}

async function deleteItem(id){
  if(!confirm('Delete this item? Historical count data for this item will also be removed.')) return;
  if(isAppBusy()) return;
  const scope=parseScopeFromForm();
  const targetStoreIds=resolveStoreIdsForScope(scope,S.billingCtx);
  if(!targetStoreIds.length){
    alert('Select at least one store to apply this delete.');
    return;
  }
  try{
    setSyncing(true,'Deleting item…');
    const removedStoreIds=await db.deleteItemForScope(scope.mode,targetStoreIds,id);
    const affectsActive=removedStoreIds.includes(ACTIVE_STORE.id);
    if(affectsActive){
      const activeId=scopedItemIdForStore(ACTIVE_STORE,itemIdSuffix(id));
      S.items=S.items.filter(i=>i.id!==id&&i.id!==activeId);
      ls.set('items',S.items);
    }
    setSyncOk();
    showBanner(`Item removed from ${itemSeedScopeLabel(scope.mode)} (${removedStoreIds.length} store${removedStoreIds.length===1?'':'s'}).`,'ok');
    render();
  }catch(e){
    setSyncErr(e.message);
    render();
  }
}

function isStandalonePWA(){
  try{
    if(window.matchMedia('(display-mode: standalone)').matches) return true;
    if(window.matchMedia('(display-mode: fullscreen)').matches) return true;
    if(window.matchMedia('(display-mode: minimal-ui)').matches) return true;
    if(typeof navigator.standalone==='boolean'&&navigator.standalone) return true;
  }catch{}
  return false;
}

function isLikelyIOS(){
  const ua=navigator.userAgent||'';
  if(/iPad|iPhone|iPod/.test(ua)) return true;
  if(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1) return true;
  return false;
}

async function runTests(){
  if(isAppBusy()) return;
  setProgressOnly(true,'Running tests…');
  const results=[];
  try{

  // Test 1: Supabase client initialized
  results.push({name:'Supabase client init',pass:!!sb,msg:sb?'':'createClient failed'});

  // Test 2: DB connection
  let connected=false;
  try{ connected = await db.checkTables(); } catch(e){ }
  results.push({name:'Database tables exist',pass:connected,msg:connected?'':'Run setup.sql in Supabase SQL Editor'});

  // Test 3: Items loaded
  results.push({name:'Items data loaded',pass:S.items.length>0,msg:S.items.length+' items'});

  // Test 4: Write test (insert + delete a test session)
  if(connected){
    try{
      const testId=makeEntityId('test');
      await sb.from('ck_sessions').insert(attachStoreScope({id:testId,counted_at:new Date().toISOString()}));
      let tq=sb.from('ck_sessions').delete().eq('id',testId);
      tq=scopeByStore(tq);
      await tq;
      results.push({name:'Write/delete cycle',pass:true,msg:'Insert + delete OK'});
    }catch(e){ results.push({name:'Write/delete cycle',pass:false,msg:e.message}); }
  } else {
    results.push({name:'Write/delete cycle',pass:false,skip:true,msg:'Skipped (no DB)'});
  }

  // Test 5: Schedule logic
  const dl=getOrderDeadline(), ta=getTruckArrival();
  const dlOk=dl>new Date()&&dl.getDay()===4;
  const taOk=ta>new Date()&&ta.getDay()===1;
  results.push({name:'Deadline is next Thursday 2pm',pass:dlOk,msg:dlOk?fmtDateTime(dl):'logic error'});
  results.push({name:'Truck arrival is next Monday 7am',pass:taOk,msg:taOk?fmtDateTime(ta):'logic error'});

  // Test 6: Usage computation
  const usageOk=typeof computeUsage()==='object';
  results.push({name:'Usage computation',pass:usageOk});

  // Test 7: Order computation
  const orderOk=Array.isArray(computeOrder());
  results.push({name:'Order computation',pass:orderOk});

  // Test 8: LocalStorage fallback
  let lsOk=false;
  try{ ls.set('_test','ok'); lsOk=ls.get('_test')==='ok'; ls.set('_test',null); }catch{}
  results.push({name:'LocalStorage fallback',pass:lsOk});

  // Test 9–11: Recommended order “Scanned” ack (sig + localStorage)
  const sigOk=orderRecSig([{id:'i1',toOrder:5},{id:'i2',toOrder:1}])==='i1:5,i2:1';
  results.push({name:'Order ack recommendation signature',pass:sigOk,msg:sigOk?'':'sig mismatch'});
  let prevOrderAck=null;
  try{ prevOrderAck=ls.get('orderAck'); }catch{}
  try{
    ls.set('orderAck',{sig:'__stale_test_bad__',flags:{x:true}});
    const emptyWhenSigMismatch=Object.keys(getOrderAckFlags([{id:'z',toOrder:1}])).length===0;
    results.push({name:'Order ack ignores wrong stored sig',pass:emptyWhenSigMismatch});
    const demoRows=[{id:'oa_t_a',toOrder:2},{id:'oa_t_b',toOrder:3}];
    const demoSig=orderRecSig(demoRows);
    ls.set('orderAck',{sig:demoSig,flags:{oa_t_a:true}});
    const f=getOrderAckFlags(demoRows);
    const readOk=!!f.oa_t_a&&!f.oa_t_b;
    results.push({name:'Order ack reads flags for current sig',pass:readOk,msg:readOk?'':JSON.stringify(f)});
  }finally{
    try{ ls.set('orderAck',prevOrderAck); }catch{}
  }

  S.testResults=results;
  render();
  }finally{
    setProgressOnly(false);
  }
}

async function reloadData(){
  if(isAppBusy()) return;
  const ov=document.getElementById('loading-overlay');
  const lm=document.getElementById('loading-msg');
  ov.style.display='flex';
  lm.textContent='Refreshing data…';
  try{
    await loadFromDB();
  }finally{
    ov.style.display='none';
  }
  render();
}

// ─── BANNER HELPER ───────────────────────────────────────────────────────────
function showBanner(msg,type){
  const m=document.getElementById('main');
  if(!m) return;
  const div=document.createElement('div');
  div.className='banner banner-'+(type==='ok'?'ok':'err');
  div.innerHTML=`<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> ${msg}`;
  m.prepend(div);
  setTimeout(()=>div.remove(),3000);
}

function normalizeItemOrderFields(item){
  const next={...item};
  const fallbackUnit=String(next.unit||'').trim()||'cs';
  const orderUnitRaw=String(next.order_unit||'').trim();
  next.order_unit=orderUnitRaw||fallbackUnit;
  const packRaw=parseFloat(next.order_pack_qty);
  next.order_pack_qty=Number.isFinite(packRaw)&&packRaw>0?packRaw:1;
  const trigRaw=String(next.reorder_trigger??'').trim();
  if(trigRaw==='') next.reorder_trigger=null;
  else{
    const trigN=parseFloat(trigRaw);
    next.reorder_trigger=Number.isFinite(trigN)?trigN:null;
  }
  return next;
}

function normalizeItemsForOrderMath(items){
  return (items||[]).map(normalizeItemOrderFields);
}

// ─── DATA LOAD ───────────────────────────────────────────────────────────────
/** Once any inventory session exists, keep the count form unlocked (no start modal). */
function syncCountFormAvailability(){
  if(S.initialSetupActive){
    S.countFormActive=false;
    return;
  }
  if(hasActiveCountDraft()){
    S.countFormActive=true;
    return;
  }
  if(S.sessions&&S.sessions.length>0) S.countFormActive=true;
  else S.countFormActive=false;
}

async function loadFromDB(){
  if(!sb){ loadFromCache(); return; }
  try{
    const ok = await db.checkTables();
    if(!ok){
      S.dbReady=false;
      loadFromCache();
      setSyncErr('Tables not found — run setup.sql in Supabase');
      return;
    }
    S.dbReady=true;
    const {items,sessions,orders,draftSession} = await db.loadAll();
    if(!items.length){
      const seeded=await db.seedItems();
      S.items = normalizeItemsForOrderMath(seeded.rows||[]);
      if((seeded.rows||[]).length){
        markInitialSetupPending({
          template_store_id:seeded.templateStoreId||null,
          seed_source:seeded.seedSource,
          item_count:seeded.rows.length
        });
      }
    } else {
      S.items = normalizeItemsForOrderMath(items);
    }
    S.sessions = sessions;
    S.orders = normalizeOrdersForReceiptData(orders||[]);
    if(draftSession){
      setCountDraftSessionState(draftSession,{promptOnResume:S.tab==='count'});
    }else{
      const cachedDraft=readCountDraftCache();
      if(cachedDraft){
        setCountDraftSessionState(cachedDraft,{promptOnResume:S.tab==='count'});
      }else{
        setCountDraftSessionState(null,{clearDraft:true});
      }
    }
    ls.set('items',S.items);
    ls.set('sessions',S.sessions);
    ls.set('orders',S.orders);
    if(S.dbSupportsBilling){
      try{
        const billingSnap=await db.loadBillingSnapshot();
        S.billingCtx=billingSnap;
        updateFeatureAccessFromSnapshot(billingSnap);
      }catch{
        updateFeatureAccessFromSnapshot(null);
      }
    }else{
      updateFeatureAccessFromSnapshot(null);
    }
    await mergeLayoutFromRemote();
    const setupStatus=readInitialSetupStatus();
    if(needsInitialParSetup(setupStatus,S.items)){
      startInitialParSetup({keepDraft:true});
    }else{
      S.initialSetupActive=false;
      S.initialSetupIndex=0;
      S.initialSetupParDraft={};
    }
    setSyncOk();
    syncCountFormAvailability();
  }catch(e){
    setSyncErr(e.message);
    loadFromCache();
  }
}

function loadFromCache(){
  const items = ls.get('items');
  S.items = normalizeItemsForOrderMath(items||scopedSeedItems());
  S.sessions = ls.get('sessions')||[];
  S.orders = normalizeOrdersForReceiptData(ls.get('orders')||[]);
  const cachedDraft=readCountDraftCache();
  if(cachedDraft){
    setCountDraftSessionState(cachedDraft,{promptOnResume:S.tab==='count'});
  }else{
    setCountDraftSessionState(null,{clearDraft:true});
  }
  updateFeatureAccessFromSnapshot(null);
  const setupStatus=readInitialSetupStatus();
  if(needsInitialParSetup(setupStatus,S.items)){
    startInitialParSetup({keepDraft:true});
  }else{
    S.initialSetupActive=false;
    S.initialSetupIndex=0;
    S.initialSetupParDraft={};
  }
  syncCountFormAvailability();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function finishBoot(){
  await loadFromDB();
  applyRouteFromHash();
  document.getElementById('loading-overlay').style.display='none';
  render();
  if(!window.__ckVisStaleBound){
    window.__ckVisStaleBound=true;
    document.addEventListener('visibilitychange',()=>{
      if(document.visibilityState==='hidden') flushLayoutPushIfPending();
    });
  }
}

async function init(){
  restoreActiveStoreContext();
  await loadCkLogic();
  loadBarcodeModeSetting();

  window.addEventListener('popstate',()=>{
    applyRouteFromHash();
    render();
  });

  setInterval(updateScheduleChip, 30000);

  window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault();
    S.installPrompt=e;
    render();
  });

  window.addEventListener('appinstalled',()=>{
    S.installPrompt=null;
    try{ sessionStorage.setItem('ck_install_banner_dismissed','1'); }catch{}
    showBanner('App installed successfully.','ok');
    render();
  });

  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }

  if(!isStoreAuthed()){
    document.getElementById('loading-overlay').style.display='none';
    document.getElementById('pin-overlay').style.display='flex';
    const pi=document.getElementById('pin-input');
    const er=document.getElementById('pin-err');
    if(er) er.textContent='';
    if(pi) pi.value='';
    focusStorePinInput();
    return;
  }
  await finishBoot();
}

init();
</script>
